<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 小朋友学汉字 - 笔顺学习助手</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 标题样式 */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 2.5em;
            color: #ff6b6b;
            text-shadow: 3px 3px 0 #ffd93d;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            color: #6c5ce7;
        }

        /* 输入区域 */
        .input-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .input-section h2 {
            color: #6c5ce7;
            margin-bottom: 20px;
            font-size: 1.5em;
            text-align: center;
        }

        .input-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        #charInput {
            width: 100%;
            max-width: 400px;
            padding: 18px 25px;
            font-size: 1.5em;
            border: 4px solid #a29bfe;
            border-radius: 20px;
            outline: none;
            text-align: center;
            letter-spacing: 10px;
            transition: all 0.3s;
            min-height: 120px;
            resize: vertical;
            line-height: 1.8;
        }

        #charInput:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
        }

        .btn {
            padding: 18px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.5);
        }

        .btn-clear {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: white;
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
        }

        .btn-clear:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.5);
        }

        .btn-batch {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 184, 148, 0.4);
        }

        .btn-batch:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 184, 148, 0.5);
        }

        .char-count {
            text-align: center;
            margin-top: 15px;
            color: #6c5ce7;
            font-size: 1.1em;
        }

        .char-count span {
            color: #ff6b6b;
            font-weight: bold;
            font-size: 1.3em;
        }

        /* 汉字展示区域 */
        .display-section {
            display: none;
            margin-bottom: 30px;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .character-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .character-card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .card-header h3 {
            font-size: 3em;
            color: #ff6b6b;
            margin-bottom: 15px;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 10px 15px;
            font-size: 1.3em;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            min-width: 45px;
        }

        .btn-animate {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4);
        }

        .btn-animate:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.5);
        }

        .btn-speak {
            background: linear-gradient(135deg, #fdcb6e, #f39c12);
            color: white;
            box-shadow: 0 4px 15px rgba(253, 203, 110, 0.4);
        }

        .btn-speak:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(253, 203, 110, 0.5);
        }

        /* 田字格样式 */
        .tianzige-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            position: relative;
        }

        .tianzige {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            border: 4px solid #ff6b6b;
            border-radius: 10px;
            z-index: 1;
        }

        /* 田字格的虚线 */
        .tianzige::before,
        .tianzige::after {
            content: '';
            position: absolute;
            background: #ddd;
            z-index: 1;
        }

        .tianzige::before {
            width: 100%;
            height: 2px;
            top: 50%;
            left: 0;
            border-top: 2px dashed #ff6b6b;
            border-bottom: none;
        }

        .tianzige::after {
            width: 2px;
            height: 100%;
            left: 50%;
            top: 0;
            border-left: 2px dashed #ff6b6b;
            border-right: none;
        }

        .tianzige-container svg {
            position: relative;
            z-index: 2;
        }

        /* 提示信息 */
        .info-message {
            background: #fff3cd;
            border: 3px solid #ffc107;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-message p {
            color: #856404;
            font-size: 1.1em;
        }

        /* 动画中的提示 */
        .tianzige-container.animating::after {
            content: '✏️ 书写中...';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00b894;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            animation: pulse 1s infinite;
            white-space: nowrap;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 错误提示 */
        .error-message {
            background: #f8d7da;
            border: 3px solid #f5c6cb;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .error-message p {
            color: #721c24;
            font-size: 1.1em;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .header p {
                font-size: 0.9em;
            }

            .input-section {
                padding: 20px 15px;
            }

            #charInput {
                font-size: 1.2em;
                padding: 12px 15px;
                letter-spacing: 5px;
                min-height: 100px;
            }

            .btn {
                padding: 12px 25px;
                font-size: 1em;
            }

            .character-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .character-card {
                padding: 15px;
            }

            .card-header {
                align-items: center;
            }

            .card-header h3 {
                font-size: 2em;
                margin-bottom: 10px;
            }

            .btn-sm {
                padding: 8px 15px;
                font-size: 0.9em;
            }

            .tianzige-container {
                margin: 10px auto;
            }

            .tianzige,
            #character-target {
                width: 150px;
                height: 150px;
            }

            .tianzige {
                border-width: 3px;
            }
        }

        /* 超小屏幕适配 */
        @media (max-width: 375px) {
            .tianzige,
            #character-target {
                width: 130px;
                height: 130px;
            }

            .card-header h3 {
                font-size: 1.8em;
            }

            .btn-sm {
                padding: 6px 12px;
                font-size: 0.85em;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>📚 小朋友学汉字</h1>
            <p>✏️ 看动画、学笔顺、练写字！</p>
        </div>

        <!-- 输入区域 -->
        <div class="input-section">
            <h2>🔤 输入你要学习的汉字</h2>
            <div class="input-box">
                <textarea
                    id="charInput"
                    placeholder="输入要学习的汉字"
                ></textarea>
                <button class="btn btn-primary" id="loadBtn">🚀 开始学习</button>
                <button class="btn btn-batch" id="batchBtn">🎬 批量播放</button>
                <button class="btn btn-clear" id="clearBtn">🗑️ 清空</button>
            </div>
            <div class="char-count">
                已输入 <span id="charCount">0</span> 个汉字
            </div>
        </div>

        <!-- 错误提示 -->
        <div class="error-message" id="errorMessage">
            <p id="errorText"></p>
        </div>

        <!-- 汉字展示区域 -->
        <div class="display-section" id="displaySection">
            <div class="character-grid" id="characterGrid"></div>
        </div>
    </div>

    <script>
        // 存储所有汉字的 writer 实例
        const writers = {};

        // 所有函数定义 - 全局作用域
        window.clearAll = function() {
            document.getElementById('charInput').value = '';
            document.getElementById('charCount').textContent = '0';
            document.getElementById('displaySection').style.display = 'none';
            document.getElementById('characterGrid').innerHTML = '';
            document.getElementById('errorMessage').style.display = 'none';
            // 清空 writers
            for (let key in writers) {
                delete writers[key];
            }
        };

        window.showError = function(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(function() {
                errorDiv.style.display = 'none';
            }, 3000);
        };

        window.loadCharacters = async function() {
            const input = document.getElementById('charInput').value.trim();

            if (!input) {
                showError('⚠️ 请先输入要学习的汉字！');
                return;
            }

            const characters = input.split('');
            const grid = document.getElementById('characterGrid');
            grid.innerHTML = '';
            // 清空 writers
            for (let key in writers) {
                delete writers[key];
            }

            // 显示展示区域
            document.getElementById('displaySection').style.display = 'block';

            // 为每个汉字创建卡片
            for (let i = 0; i < characters.length; i++) {
                const char = characters[i];
                await createCharacterCard(char, i);
            }

            // 滚动到展示区域
            document.getElementById('displaySection').scrollIntoView({ behavior: 'smooth' });
        };

        window.createCharacterCard = async function(char, index) {
            const grid = document.getElementById('characterGrid');

            // 根据屏幕宽度动态设置田字格大小
            const screenWidth = window.innerWidth;
            let gridSize = 220;
            let svgWidth = 220;
            let svgHeight = 220;
            let padding = 2;  // 减小 padding 让汉字更大

            if (screenWidth <= 375) {
                // 超小屏幕
                gridSize = 130;
                svgWidth = 130;
                svgHeight = 130;
                padding = 1;
            } else if (screenWidth <= 768) {
                // 手机屏幕
                gridSize = 150;
                svgWidth = 150;
                svgHeight = 150;
                padding = 1;
            }

            const card = document.createElement('div');
            card.className = 'character-card';
            card.id = 'card-' + index;

            card.innerHTML =
                '<div class="card-header">' +
                    '<div class="card-buttons">' +
                        '<button class="btn-sm btn-animate" onclick="animateCharacter(' + index + ')">▶️ 播放动画</button> ' +
                        '<button class="btn-sm btn-speak" onclick="speakCharacter(\'' + char + '\')">🔊 朗读</button> ' +
                    '</div>' +
                '</div>' +
                '<div class="tianzige-container" id="tianzige-' + index + '" style="width:' + gridSize + 'px;height:' + gridSize + 'px">' +
                    '<div class="tianzige"></div>' +
                    '<svg id="character-target-' + index + '" width="' + svgWidth + '" height="' + svgHeight + '"></svg>' +
                '</div>';

            grid.appendChild(card);

            // 创建 HanziWriter 实例
            try {
                const writer = HanziWriter.create('character-target-' + index, char, {
                    width: svgWidth,
                    height: svgHeight,
                    padding: padding,
                    showOutline: true,
                    strokeAnimationSpeed: 1,
                    delayBetweenStrokes: 200,
                    strokeColor: '#2d3436',
                    radicalColor: '#ff6b6b',
                    outlineColor: '#dfe6e9',
                    showCharacter: false
                });

                writers[index] = writer;

                // 等待 writer 加载完成
                await writer.quiz();

                // 清除练习模式
                writers[index] = HanziWriter.create('character-target-' + index, char, {
                    width: svgWidth,
                    height: svgHeight,
                    padding: padding,
                    showOutline: true,
                    strokeAnimationSpeed: 1,
                    delayBetweenStrokes: 200,
                    strokeColor: '#2d3436',
                    radicalColor: '#ff6b6b',
                    outlineColor: '#dfe6e9',
                    showCharacter: false
                });

            } catch (error) {
                console.error('加载汉字失败:', char, error);
                document.getElementById('tianzige-' + index).innerHTML =
                    '<p style="text-align: center; color: #e74c3c;">😅 这个汉字暂时无法加载</p>';
            }
        };

        window.animateCharacter = function(index) {
            const writer = writers[index];
            const tianzigeContainer = document.getElementById('tianzige-' + index);

            if (!writer) {
                showError('⚠️ 请等待汉字加载完成！');
                return;
            }

            // 添加动画中的标记
            tianzigeContainer.classList.add('animating');

            // 重新创建 writer 确保从空白开始
            const char = document.getElementById('charInput').value[index];

            // 根据屏幕宽度动态设置大小
            const screenWidth = window.innerWidth;
            let svgWidth = 220;
            let svgHeight = 220;
            let padding = 2;  // 减小 padding 让汉字更大

            if (screenWidth <= 375) {
                svgWidth = 130;
                svgHeight = 130;
                padding = 1;
            } else if (screenWidth <= 768) {
                svgWidth = 150;
                svgHeight = 150;
                padding = 1;
            }

            writers[index] = HanziWriter.create('character-target-' + index, char, {
                width: svgWidth,
                height: svgHeight,
                padding: padding,
                showOutline: true,
                strokeAnimationSpeed: 1,
                delayBetweenStrokes: 300,
                strokeColor: '#2d3436',
                radicalColor: '#ff6b6b',
                outlineColor: '#dfe6e9',
                showCharacter: false
            });

            writers[index].animateCharacter({
                onComplete: function() {
                    tianzigeContainer.classList.remove('animating');
                }
            });
        };

        window.speakCharacter = function(char) {
            if ('speechSynthesis' in window) {
                // 停止当前正在播放的语音
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(char);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                utterance.pitch = 1.2;

                window.speechSynthesis.speak(utterance);
            } else {
                showError('⚠️ 您的浏览器不支持语音朗读功能');
            }
        };

        window.batchAnimate = async function() {
            const input = document.getElementById('charInput').value.trim();

            if (!input) {
                showError('⚠️ 请先输入要学习的汉字！');
                return;
            }

            // 获取所有汉字
            const characters = input.split('');

            // 如果还没有加载汉字，先加载
            if (Object.keys(writers).length === 0 || Object.keys(writers).length !== characters.length) {
                await loadCharacters();
                // 等待一下确保所有 writer 都创建完成
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            // 依次播放每个汉字的动画
            for (let i = 0; i < characters.length; i++) {
                await new Promise(function(resolve) {
                    const writer = writers[i];
                    const tianzigeContainer = document.getElementById('tianzige-' + i);

                    if (!writer) {
                        console.error('Writer not found for index:', i);
                        resolve();
                        return;
                    }

                    // 添加动画中的标记
                    tianzigeContainer.classList.add('animating');

                    // 重新创建 writer 确保从空白开始
                    const char = characters[i];

                    // 根据屏幕宽度动态设置大小
                    const screenWidth = window.innerWidth;
                    let svgWidth = 220;
                    let svgHeight = 220;
                    let padding = 2;

                    if (screenWidth <= 375) {
                        svgWidth = 130;
                        svgHeight = 130;
                        padding = 1;
                    } else if (screenWidth <= 768) {
                        svgWidth = 150;
                        svgHeight = 150;
                        padding = 1;
                    }

                    writers[i] = HanziWriter.create('character-target-' + i, char, {
                        width: svgWidth,
                        height: svgHeight,
                        padding: padding,
                        showOutline: true,
                        strokeAnimationSpeed: 1,
                        delayBetweenStrokes: 300,
                        strokeColor: '#2d3436',
                        radicalColor: '#ff6b6b',
                        outlineColor: '#dfe6e9',
                        showCharacter: false
                    });

                    writers[i].animateCharacter({
                        onComplete: function() {
                            tianzigeContainer.classList.remove('animating');
                            resolve();
                        }
                    });
                });

                // 每个汉字之间稍微停顿一下
                await new Promise(r => setTimeout(r, 300));
            }

            showError('🎉 批量播放完成！');
        };

        // DOM 加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成，初始化事件监听器');

            // 监听输入，实时更新字符计数
            const charInput = document.getElementById('charInput');

            if (charInput) {
                // 输入事件 - 只更新计数，不做过滤
                charInput.addEventListener('input', function(e) {
                    const value = e.target.value;
                    document.getElementById('charCount').textContent = value.length;
                });

                // 失去焦点时 - 过滤非汉字字符
                charInput.addEventListener('blur', function(e) {
                    const value = e.target.value;
                    const filteredValue = value.replace(/[^\u4e00-\u9fa5]/g, '');
                    if (value !== filteredValue) {
                        e.target.value = filteredValue;
                        document.getElementById('charCount').textContent = filteredValue.length;
                    }
                });
            }

            // 绑定按钮事件
            const loadBtn = document.getElementById('loadBtn');
            const clearBtn = document.getElementById('clearBtn');
            const batchBtn = document.getElementById('batchBtn');

            if (loadBtn) {
                loadBtn.addEventListener('click', function() {
                    console.log('开始学习按钮被点击');
                    loadCharacters();
                });
            }

            if (batchBtn) {
                batchBtn.addEventListener('click', function() {
                    console.log('批量播放按钮被点击');
                    batchAnimate();
                });
            }

            if (clearBtn) {
                clearBtn.addEventListener('click', function() {
                    console.log('清空按钮被点击');
                    clearAll();
                });
            }

            console.log('所有事件监听器已绑定');
            console.log('loadCharacters 函数存在:', typeof window.loadCharacters);
        });
    </script>
</body>
</html>
