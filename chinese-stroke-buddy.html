<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 小朋友学汉字 - 笔顺学习助手</title>
    <!--
        HanziWriter 库
        原始来源: https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js
        版本: 3.5
        本地化: lib/hanzi-writer.min.js
        更新日期: 2026-03-15
    -->
    <script src="lib/hanzi-writer.min.js"></script>
    <!--
        pinyin-pro 库
        原始来源: https://cdn.jsdelivr.net/npm/pinyin-pro@3.27.0/dist/index.js
        版本: 3.27.0
        本地化: lib/pinyin-pro.js
        更新日期: 2026-03-15
    -->
    <script src="lib/pinyin-pro.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background-color: #f9f4e8;
            background-image:
                linear-gradient(rgba(200, 190, 170, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 190, 170, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* 纸张纹理效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.03"/></svg>');
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 标题样式 */
        .section-title {
            text-align: center;
            padding: 15px 20px;
            margin-bottom: 15px;
        }

        .section-title h1 {
            font-size: 2em;
            color: #8b4513;
            margin-bottom: 5px;
        }

        .section-title p {
            font-size: 1em;
            color: #a0826d;
        }

        /* 输入区域 */
        .input-section {
            background: #fffbf0;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 2px 2px 0 rgba(180, 170, 150, 0.3);
            border: 2px solid #e0d8c8;
        }

        .input-section h2 {
            color: #8b4513;
            margin-bottom: 20px;
            font-size: 1.5em;
            text-align: center;
        }

        .input-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        #charInput {
            width: 100%;
            max-width: 400px;
            padding: 18px 25px;
            font-size: 1.5em;
            border: 3px solid #d4c8b8;
            border-radius: 8px;
            outline: none;
            text-align: center;
            letter-spacing: 10px;
            transition: all 0.2s;
            min-height: 120px;
            resize: vertical;
            line-height: 1.8;
            background: #ffffff;
        }

        #charInput:focus {
            border-color: #b8a888;
            box-shadow: 0 0 0 3px rgba(180, 170, 150, 0.1);
        }

        .btn {
            padding: 18px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            position: relative;
            /* 手绘边框效果 */
            box-shadow:
                2px 2px 0 rgba(0, 0, 0, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.1);
        }

        /* 按钮内边框 - 模拟蜡笔手绘 */
        .btn::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 250px 12px 220px 12px / 12px 220px 12px 250px;
            pointer-events: none;
        }

        /* 蜡笔纹理 */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="crayon"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" /></filter><rect width="100%" height="100%" filter="url(%23crayon)" opacity="0.15"/></svg>');
            border-radius: inherit;
            pointer-events: none;
            opacity: 0.5;
        }

        .btn-primary {
            background: #5cb85c;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            transform: rotate(-1deg) scale(1.02);
            background: #4cae4c;
        }

        .btn-primary:active {
            transform: rotate(1deg) scale(0.98);
        }

        .btn-clear {
            background: #d0d0d0;
            color: #555;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.3);
        }

        .btn-clear:hover {
            transform: rotate(1deg) scale(1.02);
            background: #c0c0c0;
        }

        .btn-clear:active {
            transform: rotate(-1deg) scale(0.98);
        }

        .btn-batch {
            background: #f0ad4e;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .btn-batch:hover {
            transform: rotate(-0.5deg) scale(1.02);
            background: #ec971f;
        }

        .btn-batch:active {
            transform: rotate(0.5deg) scale(0.98);
        }

        .btn-batch-all {
            background: #5bc0de;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .btn-batch-all:hover {
            transform: rotate(0.5deg) scale(1.02);
            background: #31b0d5;
        }

        .btn-batch-all:active {
            transform: rotate(-0.5deg) scale(0.98);
        }

        .char-count {
            text-align: center;
            margin-top: 15px;
            color: #a0826d;
            font-size: 1.1em;
        }

        .char-count span {
            color: #8b4513;
            font-weight: bold;
            font-size: 1.3em;
        }

        /* 汉字展示区域 */
        .display-section {
            display: none;
            margin-bottom: 30px;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .character-card {
            background: #fffbf0;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 2px 2px 0 rgba(180, 170, 150, 0.3);
            transition: transform 0.2s;
            border: 2px solid #e0d8c8;
        }

        .character-card:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 rgba(180, 170, 150, 0.3);
        }

        .card-header {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .card-header h3 {
            font-size: 3em;
            color: #8b4513;
            margin-bottom: 5px;
        }

        /* 拼音样式 */
        .pinyin {
            font-size: 1.8em;
            color: #d35400;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 10px 15px;
            font-size: 1.3em;
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            min-width: 45px;
            position: relative;
            box-shadow:
                2px 2px 0 rgba(0, 0, 0, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.1);
        }

        .btn-sm::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 250px 12px 220px 12px / 12px 220px 12px 250px;
            pointer-events: none;
        }

        .btn-sm::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="crayon2"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" /></filter><rect width="100%" height="100%" filter="url(%23crayon2)" opacity="0.15"/></svg>');
            border-radius: inherit;
            pointer-events: none;
            opacity: 0.5;
        }

        .btn-animate {
            background: #5cb85c;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .btn-animate:hover {
            transform: rotate(-2deg) scale(1.05);
            background: #4cae4c;
        }

        .btn-animate:active {
            transform: rotate(2deg) scale(0.95);
        }

        .btn-speak {
            background: #f0ad4e;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .btn-speak:hover {
            transform: rotate(2deg) scale(1.05);
            background: #ec971f;
        }

        .btn-speak:active {
            transform: rotate(-2deg) scale(0.95);
        }

        /* 田字格样式 */
        .tianzige-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            position: relative;
        }

        .tianzige {
            position: absolute;
            background: #fff;
            border: 3px solid #d4a574;
            border-radius: 4px;
            z-index: 1;
            box-sizing: border-box;
            pointer-events: none;
        }

        /* 田字格的虚线 */
        .tianzige::before,
        .tianzige::after {
            content: '';
            position: absolute;
            background: #ddd;
            z-index: 1;
        }

        .tianzige::before {
            width: 100%;
            height: 2px;
            top: 50%;
            left: 0;
            border-top: 2px dashed #d4a574;
            border-bottom: none;
        }

        .tianzige::after {
            width: 2px;
            height: 100%;
            left: 50%;
            top: 0;
            border-left: 2px dashed #d4a574;
            border-right: none;
        }

        .tianzige-container svg {
            position: relative;
            z-index: 2;
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* 提示信息 */
        .info-message {
            background: #fff3cd;
            border: 3px solid #ffc107;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-message p {
            color: #856404;
            font-size: 1.1em;
        }

        /* 动画中的提示 */
        .tianzige-container.animating::after {
            content: '✏️ 书写中...';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #5a9f3c;
            color: white;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 0.9em;
            animation: pulse 1s infinite;
            white-space: nowrap;
            border: 2px solid #4a8a2c;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 错误提示 */
        .error-message {
            background: #f8d7da;
            border: 3px solid #f5c6cb;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .error-message p {
            color: #721c24;
            font-size: 1.1em;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .header p {
                font-size: 0.9em;
            }

            .input-section {
                padding: 20px 15px;
            }

            #charInput {
                font-size: 1.2em;
                padding: 12px 15px;
                letter-spacing: 5px;
                min-height: 100px;
            }

            .btn {
                padding: 12px 25px;
                font-size: 1em;
            }

            .character-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .character-card {
                padding: 15px;
            }

            .card-header {
                align-items: center;
            }

            .card-header h3 {
                font-size: 2em;
                margin-bottom: 10px;
            }

            .pinyin {
                font-size: 1.3em;
            }

            .btn-sm {
                padding: 8px 15px;
                font-size: 0.9em;
            }

            .tianzige-container {
                margin: 10px auto;
            }
        }

        /* 超小屏幕适配 */
        @media (max-width: 375px) {
            .card-header h3 {
                font-size: 1.8em;
            }

            .pinyin {
                font-size: 1.1em;
            }

            .btn-sm {
                padding: 6px 12px;
                font-size: 0.85em;
            }
        }

        /* 版权信息样式 */
        .footer {
            text-align: center;
            padding: 30px 20px;
            margin-top: 50px;
            border-top: 2px solid #e0d8c8;
        }

        .footer-link {
            color: #a0826d;
            cursor: pointer;
            transition: color 0.2s;
            margin: 0;
            font-size: 0.95em;
        }

        .footer-link:hover {
            color: #8b4513;
        }

        .footer-link #toggleIcon {
            margin-right: 5px;
        }

        /* 个人简介区域 */
        .profile-section {
            margin-top: 30px;
            padding-top: 20px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-text {
            font-size: 1.1em;
            line-height: 1.8;
            color: #8b4513;
            margin-bottom: 30px;
        }

        /* 二维码容器 */
        .qrcode-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .qrcode-item {
            text-align: center;
        }

        .qrcode-placeholder {
            width: 200px;
            height: auto;
            min-height: 200px;
            background: #f9f4e8;
            border: 2px dashed #d4a574;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            padding: 10px;
            box-sizing: border-box;
        }

        .qrcode-placeholder img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            display: block;
        }

        .qrcode-placeholder span {
            color: #a0826d;
            font-size: 0.9em;
            padding: 20px;
            text-align: center;
        }

        .qrcode-item p {
            color: #8b4513;
            font-size: 1em;
            margin: 0;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .profile-text {
                font-size: 1em;
            }

            .qrcode-container {
                gap: 20px;
            }

            .qrcode-placeholder {
                width: 120px;
                height: 120px;
            }

            .qrcode-placeholder span {
                font-size: 0.8em;
                padding: 15px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- 输入区域（包含标题） -->
        <div class="input-section">
            <div class="section-title">
                <h1>📚 小朋友学汉字</h1>
                <p>✏️ 看动画、学笔顺、练写字！</p>
            </div>
            <div class="input-box">
                <textarea
                    id="charInput"
                    placeholder="输入要学习的汉字"
                ></textarea>
                <button class="btn btn-batch" id="batchBtn">🎬 顺序播放</button>
                <button class="btn btn-batch-all" id="batchAllBtn">⏯️ 全部播放</button>
                <button class="btn btn-clear" id="clearBtn">🗑️ 清空</button>
            </div>
            <div class="char-count">
                已输入 <span id="charCount">0</span> 个汉字
            </div>
        </div>

        <!-- 错误提示 -->
        <div class="error-message" id="errorMessage">
            <p id="errorText"></p>
        </div>

        <!-- 汉字展示区域 -->
        <div class="display-section" id="displaySection">
            <div class="character-grid" id="characterGrid"></div>
        </div>

        <!-- 版权信息 -->
        <div class="footer">
            <p class="footer-link" onclick="toggleProfile()">
                <span id="toggleIcon">📖</span>
                <span id="toggleText">版权所有 码媛知道 · 点击获取更多学习工具资料</span>
            </p>

            <!-- 个人简介 -->
            <!--
                使用说明：
                1. 将二维码图片命名为：wechat.png, douyin.png, xiaohongshu.png
                2. 将图片放在与 html 同级的 images 文件夹中
                3. 修改下方的占位符，将 <span> 标签替换为：
                   <img src="images/wechat.png" alt="微信二维码" onerror="this.style.display='none';this.previousElementSibling.style.display='block'">
                   <span style="display:none">微信二维码</span>
                4. 或者直接修改 src 属性指向你的图片URL
            -->
            <div class="profile-section" id="profileSection" style="display: none;">
                <div class="profile-text">
                    35 岁前端程序媛<br/>
                    用 AI 做少儿学习工具<br/>
                    分享普通人也能学会的 AI 小技巧<br/>
                    谢谢你这么优秀还关注我
                </div>

                <!-- 社交媒体二维码 -->
                <div class="qrcode-container">
                    <div class="qrcode-item">
                        <div class="qrcode-placeholder">
                            <img src="images/wechat.png" alt="微信二维码" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                            <span style="display:none">微信二维码</span>
                        </div>
                        <p>微信</p>
                    </div>
                    <div class="qrcode-item">
                        <div class="qrcode-placeholder">
                            <img src="images/douyin.png" alt="抖音二维码" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                            <span style="display:none">抖音二维码</span>
                        </div>
                        <p>抖音</p>
                    </div>
                    <div class="qrcode-item">
                        <div class="qrcode-placeholder">
                            <img src="images/xiaohongshu.png" alt="小红书二维码" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                            <span style="display:none">小红书二维码</span>
                        </div>
                        <p>小红书</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 存储所有汉字的 writer 实例
        const writers = {};

        // 循环播放控制标志
        let isLoopPlaying = false;

        // 顺序播放控制标志
        let isBatchPlaying = false;

        // 所有函数定义 - 全局作用域
        window.clearAll = function() {
            document.getElementById('charInput').value = '';
            document.getElementById('charCount').textContent = '0';
            document.getElementById('displaySection').style.display = 'none';
            document.getElementById('characterGrid').innerHTML = '';
            document.getElementById('errorMessage').style.display = 'none';
            // 停止所有播放
            isLoopPlaying = false;
            isBatchPlaying = false;
            const batchAllBtn = document.getElementById('batchAllBtn');
            if (batchAllBtn) {
                batchAllBtn.textContent = '⏯️ 全部播放';
            }
            // 清空 writers
            for (let key in writers) {
                delete writers[key];
            }
        };

        window.showError = function(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(function() {
                errorDiv.style.display = 'none';
            }, 3000);
        };

        window.loadCharacters = async function() {
            const input = document.getElementById('charInput').value.trim();

            if (!input) {
                showError('⚠️ 请先输入要学习的汉字！');
                return;
            }

            const characters = input.split('');
            const grid = document.getElementById('characterGrid');
            grid.innerHTML = '';
            // 清空 writers
            for (let key in writers) {
                delete writers[key];
            }

            // 显示展示区域
            document.getElementById('displaySection').style.display = 'block';

            // 为每个汉字创建卡片
            for (let i = 0; i < characters.length; i++) {
                const char = characters[i];
                await createCharacterCard(char, i);
            }

            // 滚动到展示区域
            document.getElementById('displaySection').scrollIntoView({ behavior: 'smooth' });
        };

        window.createCharacterCard = async function(char, index) {
            const grid = document.getElementById('characterGrid');

            // 获取所有拼音（包括多音字）
            const pinyinList = pinyinPro.pinyin(char, { toneType: 'symbol', type: 'array', multiple: true });
            const pinyin = pinyinList.join(' / ');

            // 根据屏幕宽度动态设置 SVG 参数
            const screenWidth = window.innerWidth;
            let svgWidth = 190;
            let svgHeight = 190;
            let padding = 2;  // 减小 padding 让汉字更大

            if (screenWidth <= 375) {
                // 超小屏幕
                svgWidth = 120;
                svgHeight = 120;
                padding = 1;
            } else if (screenWidth <= 768) {
                // 手机屏幕
                svgWidth = 140;
                svgHeight = 140;
                padding = 1;
            }

            const card = document.createElement('div');
            card.className = 'character-card';
            card.id = 'card-' + index;

            card.innerHTML =
                '<div class="card-header">' +
                    '<div class="card-buttons">' +
                        '<button class="btn-sm btn-animate" onclick="animateCharacter(' + index + ')">▶️ 播放</button> ' +
                        '<button class="btn-sm btn-speak" onclick="speakCharacter(\'' + char + '\')">🔊 朗读</button> ' +
                    '</div>' +
                    '<div class="pinyin">' + pinyin + '</div>' +
                '</div>' +
                '<div class="tianzige-container" id="tianzige-' + index + '" style="width:' + svgWidth + 'px;height:' + svgHeight + 'px">' +
                    '<div class="tianzige" style="width:' + svgWidth + 'px;height:' + svgHeight + 'px"></div>' +
                    '<svg id="character-target-' + index + '" width="' + svgWidth + '" height="' + svgHeight + '"></svg>' +
                '</div>';

            grid.appendChild(card);

            // 创建 HanziWriter 实例
            try {
                const writer = HanziWriter.create('character-target-' + index, char, {
                    width: svgWidth,
                    height: svgHeight,
                    padding: padding,
                    showOutline: true,
                    strokeAnimationSpeed: 1,
                    delayBetweenStrokes: 200,
                    strokeColor: '#2d3436',
                    radicalColor: '#ff6b6b',
                    outlineColor: '#dfe6e9',
                    showCharacter: false
                });

                writers[index] = writer;

                // 等待 writer 加载完成
                await writer.quiz();

                // 清除练习模式
                writers[index] = HanziWriter.create('character-target-' + index, char, {
                    width: svgWidth,
                    height: svgHeight,
                    padding: padding,
                    showOutline: true,
                    strokeAnimationSpeed: 1,
                    delayBetweenStrokes: 200,
                    strokeColor: '#2d3436',
                    radicalColor: '#ff6b6b',
                    outlineColor: '#dfe6e9',
                    showCharacter: false
                });

            } catch (error) {
                console.error('加载汉字失败:', char, error);
                document.getElementById('tianzige-' + index).innerHTML =
                    '<p style="text-align: center; color: #e74c3c;">😅 这个汉字暂时无法加载</p>';
            }
        };

        window.animateCharacter = function(index) {
            const writer = writers[index];
            const tianzigeContainer = document.getElementById('tianzige-' + index);

            if (!writer) {
                showError('⚠️ 请等待汉字加载完成！');
                return;
            }

            // 添加动画中的标记
            tianzigeContainer.classList.add('animating');

            // 直接使用现有实例播放动画，避免重复创建
            writer.animateCharacter({
                onComplete: function() {
                    tianzigeContainer.classList.remove('animating');
                }
            });
        };

        window.speakCharacter = function(char) {
            if ('speechSynthesis' in window) {
                // 停止当前正在播放的语音
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(char);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                utterance.pitch = 1.2;

                window.speechSynthesis.speak(utterance);
            } else {
                showError('⚠️ 您的浏览器不支持语音朗读功能');
            }
        };

        window.batchAnimate = async function() {
            const input = document.getElementById('charInput').value.trim();

            if (!input) {
                showError('⚠️ 请先输入要学习的汉字！');
                return;
            }

            // 如果正在播放，先停止
            if (isBatchPlaying || isLoopPlaying) {
                isBatchPlaying = false;
                isLoopPlaying = false;
                const batchAllBtn = document.getElementById('batchAllBtn');
                if (batchAllBtn) {
                    batchAllBtn.textContent = '⏯️ 全部播放';
                }
                // 等待一下让当前播放停止
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            // 设置播放状态
            isBatchPlaying = true;

            // 获取所有汉字
            const characters = input.split('');

            // 如果还没有加载汉字，先加载
            if (Object.keys(writers).length === 0 || Object.keys(writers).length !== characters.length) {
                await loadCharacters();
                // 等待一下确保所有 writer 都创建完成
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            // 依次播放每个汉字的动画
            for (let i = 0; i < characters.length; i++) {
                // 检查是否被中断
                if (!isBatchPlaying) {
                    return;
                }

                await new Promise(function(resolve) {
                    const writer = writers[i];
                    const tianzigeContainer = document.getElementById('tianzige-' + i);

                    if (!writer) {
                        console.error('Writer not found for index:', i);
                        resolve();
                        return;
                    }

                    // 添加动画中的标记
                    tianzigeContainer.classList.add('animating');

                    // 直接使用现有实例播放动画，避免重复创建
                    writer.animateCharacter({
                        onComplete: function() {
                            tianzigeContainer.classList.remove('animating');
                            resolve();
                        }
                    });
                });

                // 每个汉字之间稍微停顿一下
                await new Promise(r => setTimeout(r, 300));
            }

            // 播放完成
            isBatchPlaying = false;
            showError('🎉 顺序播放完成！');
        };

        window.batchAnimateTogether = async function() {
            const input = document.getElementById('charInput').value.trim();

            if (!input) {
                showError('⚠️ 请先输入要学习的汉字！');
                return;
            }

            // 如果正在顺序播放，先停止
            if (isBatchPlaying) {
                isBatchPlaying = false;
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            // 切换循环播放状态
            isLoopPlaying = !isLoopPlaying;

            // 更新按钮文字
            const batchAllBtn = document.getElementById('batchAllBtn');

            if (isLoopPlaying) {
                batchAllBtn.textContent = '⏸️ 停止循环';
                showError('🔄 开始循环播放');
            } else {
                batchAllBtn.textContent = '⏯️ 全部播放';
                showError('⏹️ 已停止循环播放');
                return;
            }

            // 获取所有汉字
            const characters = input.split('');

            // 如果还没有加载汉字，先加载
            if (Object.keys(writers).length === 0 || Object.keys(writers).length !== characters.length) {
                await loadCharacters();
                // 等待一下确保所有 writer 都创建完成
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            // 循环播放函数
            const loopAnimate = async function() {
                while (isLoopPlaying) {
                    // 同时播放所有汉字的动画
                    const promises = characters.map(function(char, index) {
                        return new Promise(function(resolve) {
                            if (!isLoopPlaying) {
                                resolve();
                                return;
                            }

                            const tianzigeContainer = document.getElementById('tianzige-' + index);

                            if (!writers[index]) {
                                console.error('Writer not found for index:', index);
                                resolve();
                                return;
                            }

                            // 添加动画中的标记
                            tianzigeContainer.classList.add('animating');

                            // 直接使用现有实例播放动画，避免重复创建
                            writers[index].animateCharacter({
                                onComplete: function() {
                                    if (isLoopPlaying) {
                                        tianzigeContainer.classList.remove('animating');
                                    }
                                    resolve();
                                }
                            });
                        });
                    });

                    // 等待所有动画完成
                    await Promise.all(promises);

                    // 如果还在循环状态，等待一小段时间后继续下一轮
                    if (isLoopPlaying) {
                        await new Promise(resolve => setTimeout(resolve, 500));
                    }
                }

                // 循环结束，恢复按钮文字
                batchAllBtn.textContent = '⏯️ 全部播放';
            };

            // 开始循环
            loopAnimate();
        };

        // 切换个人简介显示/隐藏
        window.toggleProfile = function() {
            const profileSection = document.getElementById('profileSection');
            const toggleText = document.getElementById('toggleText');
            const toggleIcon = document.getElementById('toggleIcon');

            if (profileSection.style.display === 'none') {
                profileSection.style.display = 'block';
                toggleText.textContent = '收起简介';
                toggleIcon.textContent = '📕';
            } else {
                profileSection.style.display = 'none';
                toggleText.textContent = '版权所有 码媛知道 · 点击获取更多学习工具资料';
                toggleIcon.textContent = '📖';
            }
        };

        // DOM 加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成，初始化事件监听器');

            // 监听输入，实时更新字符计数
            const charInput = document.getElementById('charInput');

            if (charInput) {
                // 输入事件 - 只更新计数，不做过滤
                charInput.addEventListener('input', function(e) {
                    const value = e.target.value;
                    document.getElementById('charCount').textContent = value.length;
                });

                // 失去焦点时 - 过滤非汉字字符
                charInput.addEventListener('blur', function(e) {
                    const value = e.target.value;
                    const filteredValue = value.replace(/[^\u4e00-\u9fa5]/g, '');
                    if (value !== filteredValue) {
                        e.target.value = filteredValue;
                        document.getElementById('charCount').textContent = filteredValue.length;
                    }
                });
            }

            // 绑定按钮事件
            const clearBtn = document.getElementById('clearBtn');
            const batchBtn = document.getElementById('batchBtn');
            const batchAllBtn = document.getElementById('batchAllBtn');

            if (batchBtn) {
                batchBtn.addEventListener('click', function() {
                    console.log('顺序播放按钮被点击');
                    batchAnimate();
                });
            }

            if (batchAllBtn) {
                batchAllBtn.addEventListener('click', function() {
                    console.log('全部播放按钮被点击');
                    batchAnimateTogether();
                });
            }

            if (clearBtn) {
                clearBtn.addEventListener('click', function() {
                    console.log('清空按钮被点击');
                    clearAll();
                });
            }

            console.log('所有事件监听器已绑定');
        });
    </script>
</body>
</html>
