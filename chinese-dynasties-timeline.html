<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国历代朝代时间线 - 趣味历史探险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(200, 180, 150, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(180, 160, 130, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #F8F5F0 0%, #F5F0E8 50%, #F0EBE3 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            /* 移动端优化 */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-x pan-y;
        }

        /* 水墨纹理效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(100, 100, 100, 0.03) 0%, transparent 25%),
                radial-gradient(circle at 85% 40%, rgba(100, 100, 100, 0.02) 0%, transparent 30%),
                radial-gradient(circle at 50% 80%, rgba(100, 100, 100, 0.025) 0%, transparent 35%);
            pointer-events: none;
            z-index: 0;
        }


        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(248, 245, 240, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px 50px;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
            border-bottom: 2px solid rgba(200, 160, 100, 0.3);
        }

        /* 回纹装饰边框 */
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: repeating-linear-gradient(
                90deg,
                #C8A080 0px,
                #C8A080 10px,
                transparent 10px,
                transparent 20px
            );
            opacity: 0.3;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.4em;
            font-weight: 600;
            color: #8B4513;
            letter-spacing: 8px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }

        /* 印章装饰 */
        .header h1::before {
            content: '史';
            position: absolute;
            left: -45px;
            width: 36px;
            height: 36px;
            background: #C84032;
            color: #FFF;
            font-size: 0.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(200, 64, 50, 0.3);
            font-weight: bold;
        }

        .header h1::after {
            content: '';
            position: absolute;
            left: -45px;
            width: 36px;
            height: 36px;
            border: 2px solid #C84032;
            border-radius: 4px;
            opacity: 0.2;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .zoom-btn {
            background: linear-gradient(135deg, #D4A058, #C89050);
            border: none;
            color: #FFF;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(200, 144, 80, 0.25);
            /* 移动端触摸区域优化 */
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: linear-gradient(135deg, #E0B060, #D4A058);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(200, 144, 80, 0.35);
        }

        .zoom-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .zoom-info {
            color: #5D4E37;
            font-size: 0.95em;
            font-weight: 500;
            padding: 10px 18px;
            background: rgba(200, 160, 100, 0.15);
            border-radius: 6px;
            border: 1px solid rgba(200, 160, 100, 0.3);
            letter-spacing: 1px;
        }

        .view-toggle-btn {
            background: linear-gradient(135deg, #4A7C98, #386078);
            border: none;
            color: #FFF;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(74, 124, 152, 0.25);
            min-height: 44px;
            min-width: 44px;
            display: none; /* 默认隐藏，移动端显示 */
            align-items: center;
            justify-content: center;
        }

        .view-toggle-btn:hover {
            background: linear-gradient(135deg, #5A8CA8, #4870A8);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 124, 152, 0.35);
        }

        .view-toggle-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .timeline-container {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab;
            user-select: none;
            z-index: 10;
        }

        .timeline-container.dragging {
            cursor: grabbing;
        }

        .timeline-wrapper {
            position: relative;
            min-width: 100%;
            min-height: 100%;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            padding: 60px 40px;
        }

        .timeline-axis {
            position: relative;
            height: 400px;
            margin: 40px 0;
            min-width: 6000px;
        }

        /* 中国风时间轴 - 金色主线 */
        .timeline-axis::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 3px;
            background: linear-gradient(90deg,
                #C84032 0%,
                #D4A058 20%,
                #5D8C58 40%,
                #4A7C98 60%,
                #6B5B8E 80%,
                #8B6B8E 100%
            );
            transform: translateY(-50%);
        }

        /* 时间点装饰 - 祥云纹 */
        .timeline-axis::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 3px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 98px,
                #D4A058 98px,
                #D4A058 102px
            );
            transform: translateY(-50%);
        }

        .dynasty-block {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 4px solid #FFF;
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(200, 160, 100, 0.3),
                inset 0 0 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            text-align: center;
            /* 移动端触摸优化 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* 交替上下排列 */
        .dynasty-block:nth-child(odd) {
            top: 30px;
        }

        .dynasty-block:nth-child(even) {
            top: 230px;
        }

        /* 朝代块悬停效果 */
        .dynasty-block:hover {
            transform: scale(1.15);
            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.2),
                0 0 0 3px rgba(212, 160, 88, 0.5),
                inset 0 0 40px rgba(0, 0, 0, 0.08);
            z-index: 10;
            border-color: #FFF;
        }

        /* 移动端点击反馈 */
        .dynasty-block:active {
            transform: scale(1.05);
            box-shadow:
                0 6px 20px rgba(0, 0, 0, 0.25),
                0 0 0 3px rgba(212, 160, 88, 0.6);
            z-index: 10;
        }

        /* 先秦至汉朝 - 朱砂红 */
        .dynasty-block.ancient {
            background: linear-gradient(145deg, #E86858 0%, #C84032 50%, #A83028 100%);
        }

        /* 魏晋至隋唐 - 琉璃黄 */
        .dynasty-block.middle {
            background: linear-gradient(145deg, #E8C070 0%, #D4A058 50%, #B89048 100%);
        }

        /* 宋元明清 - 青花蓝 */
        .dynasty-block.late {
            background: linear-gradient(145deg, #6B9CC8 0%, #4A7C98 50%, #386078 100%);
        }

        .dynasty-name {
            font-size: 1.5em;
            font-weight: 700;
            color: #FFF;
            margin-bottom: 6px;
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.25);
        }

        .dynasty-years {
            font-size: 0.75em;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 500;
            position: relative;
            z-index: 1;
            line-height: 1.3;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .dynasty-duration {
            font-size: 0.8em;
            color: #FFF;
            margin-top: 6px;
            font-weight: 600;
            position: relative;
            z-index: 1;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.25);
            background: rgba(0, 0, 0, 0.2);
            padding: 3px 10px;
            border-radius: 10px;
        }

        .detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(45, 40, 35, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .detail-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .detail-card {
            background: linear-gradient(145deg, #FAF8F5 0%, #F5F0E8 100%);
            border-radius: 8px;
            max-width: 880px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px 50px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(200, 160, 100, 0.2);
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 宣纸纹理 */
        .detail-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(180, 160, 130, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(180, 160, 130, 0.02) 0%, transparent 50%);
            pointer-events: none;
            opacity: 0.5;
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid rgba(200, 64, 50, 0.3);
            color: #C84032;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .close-btn:hover {
            background: #C84032;
            color: #FFF;
            transform: rotate(90deg);
        }

        .close-btn:active {
            background: #A83028;
            transform: rotate(90deg) scale(0.95);
        }

        .detail-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(200, 160, 100, 0.3);
            position: relative;
        }

        /* 印章装饰 */
        .detail-header::after {
            content: '印';
            position: absolute;
            right: 0;
            bottom: 20px;
            width: 50px;
            height: 50px;
            background: #C84032;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            opacity: 0.15;
            font-weight: bold;
        }

        .detail-title {
            font-size: 2.8em;
            font-weight: 600;
            color: #8B4513;
            margin-bottom: 10px;
            letter-spacing: 8px;
            position: relative;
        }

        .detail-period {
            font-size: 1.2em;
            color: #6B5B4E;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .info-box {
            background: rgba(200, 160, 100, 0.08);
            padding: 18px 20px;
            border-radius: 6px;
            border: 1px solid rgba(200, 160, 100, 0.2);
            transition: all 0.3s ease;
        }

        .info-box:hover {
            background: rgba(200, 160, 100, 0.12);
            transform: translateY(-2px);
        }

        .info-label {
            font-size: 0.85em;
            color: #8B7B6E;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.05em;
            color: #5D4E37;
            font-weight: 500;
            line-height: 1.4;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.4em;
            color: #8B4513;
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: 3px;
            padding-left: 16px;
            border-left: 3px solid #C84032;
        }

        .section-content {
            color: #5D4E37;
            line-height: 1.8;
            font-size: 1.05em;
            padding: 20px 24px;
            background: rgba(200, 160, 100, 0.05);
            border-radius: 6px;
            border-left: 3px solid rgba(200, 160, 100, 0.3);
        }

        .achievements-list, .events-list {
            list-style: none;
            padding: 0;
        }

        .achievements-list li, .events-list li {
            padding: 14px 20px;
            margin-bottom: 12px;
            background: rgba(200, 160, 100, 0.05);
            border-radius: 6px;
            border-left: 3px solid rgba(212, 160, 88, 0.5);
            color: #5D4E37;
            position: relative;
            padding-left: 45px;
            transition: all 0.3s ease;
            font-size: 1em;
            line-height: 1.6;
        }

        .achievements-list li:hover, .events-list li:hover {
            background: rgba(212, 160, 88, 0.12);
            border-left-color: #D4A058;
            transform: translateX(6px);
        }

        .achievements-list li::before {
            content: '◆';
            position: absolute;
            left: 18px;
            color: #C84032;
            font-size: 0.8em;
        }

        .events-list li::before {
            content: '●';
            position: absolute;
            left: 20px;
            color: #4A7C98;
        }

        .emperors-container {
            overflow-x: auto;
            border-radius: 6px;
            border: 1px solid rgba(200, 160, 100, 0.2);
        }

        .emperors-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.5);
        }

        .emperors-table thead {
            background: rgba(200, 160, 100, 0.15);
        }

        .emperors-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #8B4513;
            border-bottom: 2px solid rgba(200, 160, 100, 0.3);
            font-size: 0.95em;
        }

        .emperors-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(200, 160, 100, 0.15);
            color: #5D4E37;
            font-size: 0.9em;
        }

        .emperors-table td:nth-child(2) {
            max-width: 140px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .emperors-table tbody tr:last-child td {
            border-bottom: none;
        }

        .emperors-table tbody tr:hover {
            background: rgba(200, 160, 100, 0.08);
        }

        .legend {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(248, 245, 240, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px 24px;
            border-radius: 8px;
            border: 1px solid rgba(200, 160, 100, 0.3);
            z-index: 50;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .legend:hover {
            opacity: 1;
        }

        .legend-title {
            color: #8B4513;
            font-weight: 600;
            margin-bottom: 14px;
            font-size: 1em;
            letter-spacing: 2px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            color: #5D4E37;
            font-size: 0.9em;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-color {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid #FFF;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .instructions {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(248, 245, 240, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px 24px;
            border-radius: 8px;
            border: 1px solid rgba(200, 160, 100, 0.3);
            z-index: 50;
            color: #5D4E37;
            font-size: 0.9em;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .instructions:hover {
            opacity: 1;
        }

        .instructions div {
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .instructions div:last-child {
            margin-bottom: 0;
        }

        .instructions span {
            color: #C84032;
            font-weight: 500;
        }

        .copyright {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            color: #8B7B6E;
            font-size: 0.75em;
            letter-spacing: 1px;
            z-index: 50;
            opacity: 0.5;
            text-align: center;
            pointer-events: none;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(200, 160, 100, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(200, 160, 100, 0.4);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 160, 100, 0.6);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 14px;
            height: 14px;
        }

        ::-webkit-scrollbar-track {
            background: linear-gradient(135deg, #ffeaa7, #fff);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 10px;
            border: 3px solid #fff;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #ffed4e, #ffd700);
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }

            .header h1 {
                font-size: 1.4em;
                letter-spacing: 4px;
            }

            .header h1::before {
                left: -38px;
                width: 30px;
                height: 30px;
                font-size: 0.4em;
            }

            .header h1::after {
                left: -38px;
                width: 30px;
                height: 30px;
            }

            .header-content {
                flex-direction: column;
                gap: 12px;
            }

            .controls {
                gap: 8px;
            }

            .zoom-btn {
                padding: 8px 16px;
                font-size: 0.85em;
            }

            .zoom-info {
                padding: 8px 12px;
                font-size: 0.85em;
            }

            .timeline-container {
                top: 90px;
            }

            .timeline-wrapper {
                padding: 40px 20px;
            }

            .timeline-axis {
                height: 350px;
            }

            .dynasty-block {
                width: 120px;
                height: 120px;
                padding: 12px;
                border-width: 3px;
            }

            .dynasty-block:nth-child(odd) {
                top: 20px;
            }

            .dynasty-block:nth-child(even) {
                top: 200px;
            }

            .dynasty-name {
                font-size: 1.1em;
                letter-spacing: 2px;
                margin-bottom: 4px;
            }

            .dynasty-years {
                font-size: 0.65em;
                padding: 3px 8px;
                margin-bottom: 4px;
            }

            .dynasty-duration {
                font-size: 0.7em;
                padding: 2px 8px;
            }

            .detail-card {
                padding: 24px 20px;
                max-height: 85vh;
                border-radius: 6px;
            }

            .close-btn {
                width: 44px;
                height: 44px;
                top: 15px;
                right: 15px;
                font-size: 1.3em;
            }

            .detail-title {
                font-size: 1.8em;
                letter-spacing: 4px;
                padding-right: 40px;
            }

            .detail-period {
                font-size: 1em;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .section-title {
                font-size: 1.2em;
            }

            .section-content {
                padding: 16px 18px;
                font-size: 0.95em;
            }

            .achievements-list li,
            .events-list li {
                padding: 12px 16px;

            },
            {

                capital: '北京',
                category: 'late',
                achievements: [

                events: [

            {
                name: '民国',
                period: '1912年 - 1949年',
                startYear: 1912,
                endYear: 1949,
                duration: '37年',
                founder: '孙中山(临时大总统)',
                capital: '南京、北京、重庆等',
                category: 'late',
                achievements: [
                    '推翻帝制,建立共和国',
                    '五四运动——新文化运动',
                    '白话文推广',
                    '京张铁路等近代工业发展',
                    '西南联大——教育奇迹',
                    '抗战胜利'
                ],
                events: [
                    '辛亥革命成功',
                    '中华民国成立(1912)',
                    '袁世凯称帝失败',
                    '五四运动(1919)',
                    '北伐战争',
                    '抗日战争(1937-1945)',
                    '新中国成立(1949)'
                ],
                culture: '民国时期是中国从传统社会向现代社会转型的重要阶段。这一时期思想文化空前活跃,民主科学思想传播,文学艺术革新,教育事业快速发展。抗战期间全民族团结一致,展现出坚韧的民族精神。',
                emperors: [
                    { name: '孙中山(临时大总统)', nianhao: '-', period: '1912年', duration: '3个月' },
                    { name: '袁世凯(大总统)', nianhao: '-', period: '1912年 - 1916年', duration: '4年' },
                    { name: '黎元洪', nianhao: '-', period: '1916年 - 1917年', duration: '1年' },
                    { name: '冯国璋', nianhao: '-', period: '1917年 - 1918年', duration: '1年' },
                    { name: '徐世昌', nianhao: '-', period: '1918年 - 1922年', duration: '4年' },
                    { name: '曹锟', nianhao: '-', period: '1923年 - 1924年', duration: '1年' },
                    { name: '蒋介石', nianhao: '-', period: '1928年 - 1948年', duration: '20年' },
                    { name: '李宗仁(代总统)', nianhao: '-', period: '1949年', duration: '8个月' }
                ]
            }
        ];

        let currentZoom = 1;
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let scrollLeft = 0;
        let scrollTop = 0;

        const minYear = Math.min(...dynasties.map(d => d.startYear));
        const maxYear = Math.max(...dynasties.map(d => d.endYear));
        const totalYears = maxYear - minYear;

        function renderTimeline() {
            const axis = document.getElementById('timeline-axis');
            const containerWidth = 6000;
            const dynastyCount = dynasties.length;
            const spacing = containerWidth / (dynastyCount + 1);

            dynasties.forEach((dynasty, index) => {
                const centerPos = spacing * (index + 1);

                const block = document.createElement('div');
                block.className = `dynasty-block ${dynasty.category}`;
                block.style.left = `${centerPos}px`;

                block.innerHTML = `
                    <div class="dynasty-name">${dynasty.name}</div>
                    <div class="dynasty-years">${dynasty.period}</div>
                    <div class="dynasty-duration">${dynasty.duration}</div>
                `;

                block.onclick = (e) => {
                    e.stopPropagation();
                    showDetail(dynasty);
                };
                axis.appendChild(block);
            });
        }

        function showDetail(dynasty) {
            const modal = document.getElementById('detail-modal');
            const card = document.getElementById('detail-card');

            card.innerHTML = `
                <button class="close-btn" onclick="closeDetail()">✕</button>
                
                <div class="detail-header">
                    <div class="detail-title">${dynasty.name}</div>
                    <div class="detail-period">${dynasty.period}</div>
                </div>

                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label">⏱️ 存续时间</div>
                        <div class="info-value">${dynasty.duration}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">👑 开国君主</div>
                        <div class="info-value">${dynasty.founder}</div>
                    </div>
                    <div class="info-box" style="grid-column: 1 / -1;">
                        <div class="info-label">🏙️ 都城</div>
                        <div class="info-value">${dynasty.capital}</div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">🏆 主要成就</div>
                    <ul class="achievements-list">
                        ${dynasty.achievements.map(a => `<li>${a}</li>`).join('')}
                    </ul>
                </div>

                <div class="section">
                    <div class="section-title">📜 重大历史事件</div>
                    <ul class="events-list">
                        ${dynasty.events.map(e => `<li>${e}</li>`).join('')}
                    </ul>
                </div>

                <div class="section">
                    <div class="section-title">🎨 文化特色</div>
                    <div class="section-content">${dynasty.culture}</div>
                </div>

                ${dynasty.emperors && dynasty.emperors.length > 0 ? `
                <div class="section">
                    <div class="section-title">👑 重要君主</div>
                    <div class="emperors-container">
                        <table class="emperors-table">
                            <thead>
                                <tr>
                                    <th>君主</th>
                                    <th>年号</th>
                                    <th>在位时间</th>
                                    <th>在位年限</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${dynasty.emperors.map(e => `
                                    <tr>
                                        <td>${e.name}</td>
                                        <td>${e.nianhao}</td>
                                        <td>${e.period}</td>
                                        <td>${e.duration}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
                ` : ''}
            `;

            modal.classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        function zoomIn() {
            currentZoom = Math.min(currentZoom + 0.2, 3);
            updateZoom();
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 0.2, 0.5);
            updateZoom();
        }

        function resetZoom() {
            currentZoom = 1;
            updateZoom();
        }

        function updateZoom() {
            const wrapper = document.getElementById('timeline-wrapper');
            wrapper.style.transform = `scale(${currentZoom})`;
            document.getElementById('zoom-level').textContent = `${Math.round(currentZoom * 100)}%`;
        }

        // 拖拽功能
        const container = document.getElementById('timeline-container');

        container.addEventListener('mousedown', (e) => {
            if (e.target.closest('.dynasty-block')) return;
            
            isDragging = true;
            container.classList.add('dragging');
            startX = e.pageX - container.offsetLeft;
            startY = e.pageY - container.offsetTop;
            scrollLeft = container.scrollLeft;
            scrollTop = container.scrollTop;
        });

        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const x = e.pageX - container.offsetLeft;
            const y = e.pageY - container.offsetTop;
            const walkX = (x - startX) * 1.5;
            const walkY = (y - startY) * 1.5;
            
            container.scrollLeft = scrollLeft - walkX;
            container.scrollTop = scrollTop - walkY;
        });

        container.addEventListener('mouseup', () => {
            isDragging = false;
            container.classList.remove('dragging');
        });

        container.addEventListener('mouseleave', () => {
            isDragging = false;
            container.classList.remove('dragging');
        });

        // 触摸事件支持（手机拖动）
        container.addEventListener('touchstart', (e) => {
            if (e.target.closest('.dynasty-block')) return;

            isDragging = true;
            container.classList.add('dragging');
            const touch = e.touches[0];
            startX = touch.clientX - container.offsetLeft;
            startY = touch.clientY - container.offsetTop;
            scrollLeft = container.scrollLeft;
            scrollTop = container.scrollTop;
        }, { passive: true });

        container.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();

            const touch = e.touches[0];
            const x = touch.clientX - container.offsetLeft;
            const y = touch.clientY - container.offsetTop;
            const walkX = (x - startX) * 1.5;
            const walkY = (y - startY) * 1.5;

            container.scrollLeft = scrollLeft - walkX;
            container.scrollTop = scrollTop - walkY;
        }, { passive: false });

        container.addEventListener('touchend', () => {
            isDragging = false;
            container.classList.remove('dragging');
        });

        container.addEventListener('touchcancel', () => {
            isDragging = false;
            container.classList.remove('dragging');
        });

        // 鼠标滚轮缩放
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                zoomIn();
            } else {
                zoomOut();
            }
        });

        // 点击模态框背景关闭
        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'detail-modal') {
                closeDetail();
            }
        });

        // ESC键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeDetail();
            }
        });

        // 卡片视图相关变量
        let isCardView = false;

        // 切换卡片视图
        function toggleCardView() {
            const container = document.getElementById('cardViewContainer');
            const timelineContainer = document.getElementById('timeline-container');
            const btn = document.getElementById('viewToggleBtn');

            isCardView = !isCardView;

            if (isCardView) {
                // 进入卡片视图
                container.style.display = 'flex';
                timelineContainer.classList.add('card-mode');
                btn.textContent = '📜 时间线';
                renderCardView();
            } else {
                // 返回时间线视图
                container.style.display = 'none';
                timelineContainer.classList.remove('card-mode');
                btn.textContent = '📇 卡片';
            }
        }

        // 渲染卡片视图
        function renderCardView() {
            const wrapper = document.getElementById('cardViewWrapper');
            const nav = document.getElementById('cardViewNav');

            wrapper.innerHTML = '';
            nav.innerHTML = '';

            dynasties.forEach((dynasty, index) => {
                // 创建卡片项
                const item = document.createElement('div');
                item.className = 'card-view-item';

                // 朝代圆形徽章
                const dynastyCard = document.createElement('div');
                dynastyCard.className = `card-view-dynasty ${dynasty.category}`;
                dynastyCard.innerHTML = `
                    <div class="dynasty-name">${dynasty.name}</div>
                    <div class="dynasty-years">${dynasty.period}</div>
                    <div class="dynasty-duration">${dynasty.duration}</div>
                `;

                // 点击徽章查看详情
                dynastyCard.onclick = () => {
                    showDetail(dynasty);
                };

                // 信息卡片
                const infoCard = document.createElement('div');
                infoCard.className = 'card-view-info';
                infoCard.innerHTML = `<p>${dynasty.culture.substring(0, 80)}...</p>`;

                item.appendChild(dynastyCard);
                item.appendChild(infoCard);

                // 如果有皇帝数据，添加皇帝滑动区域
                if (dynasty.emperors && dynasty.emperors.length > 0) {
                    const emperorsContainer = document.createElement('div');
                    emperorsContainer.className = 'card-view-emperors';

                    dynasty.emperors.forEach(emperor => {
                        const emperorCard = document.createElement('div');
                        emperorCard.className = 'emperor-card';
                        emperorCard.innerHTML = `
                            <div class="emperor-name">${emperor.name}</div>
                            <div class="emperor-nianhao">${emperor.nianhao}</div>
                            <div class="emperor-period">${emperor.period}</div>
                            <div class="emperor-duration">${emperor.duration}</div>
                        `;
                        emperorsContainer.appendChild(emperorCard);
                    });

                    item.appendChild(emperorsContainer);

                    // 添加滑动提示
                    const hint = document.createElement('div');
                    hint.className = 'emperors-hint';
                    hint.textContent = '← 左右滑动查看更多君主 →';
                    item.appendChild(hint);
                }

                wrapper.appendChild(item);

                // 创建导航点
                const dot = document.createElement('div');
                dot.className = 'card-view-nav-dot';
                if (index === 0) dot.classList.add('active');
                nav.appendChild(dot);
            });

            // 监听滚动更新导航点
            wrapper.onscroll = () => {
                const items = wrapper.querySelectorAll('.card-view-item');
                const dots = nav.querySelectorAll('.card-view-nav-dot');
                const scrollTop = wrapper.scrollTop;

                items.forEach((item, index) => {
                    const itemTop = item.offsetTop - wrapper.scrollTop;
                    if (itemTop >= -100 && itemTop < 100) {
                        dots.forEach(d => d.classList.remove('active'));
                        dots[index].classList.add('active');
                    }
                });
            };
        }

        window.onload = () => {
            renderTimeline();
        };

        // 窗口大小改变时重新渲染
        window.addEventListener('resize', () => {
            document.getElementById('timeline-axis').innerHTML = '';
            renderTimeline();
        });
    </script>
