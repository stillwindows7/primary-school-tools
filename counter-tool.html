<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 小学算珠计数器 - 进位教学工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background-color: #f9f4e8;
            background-image:
                linear-gradient(rgba(200, 190, 170, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 190, 170, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* 纸张纹理效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.03"/></svg>');
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 标题样式 */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: #fffbf0;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 2px 2px 0 rgba(180, 170, 150, 0.3);
            border: 2px solid #e0d8c8;
        }

        .header h1 {
            font-size: 2.5em;
            color: #8b4513;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            color: #a0826d;
        }

        /* 控制区域 */
        .controls {
            background: #fffbf0;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 2px 2px 0 rgba(180, 170, 150, 0.3);
            border: 2px solid #e0d8c8;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .mode-label {
            font-size: 1.3em;
            color: #8b4513;
            font-weight: bold;
        }

        .mode-btn {
            padding: 12px 25px;
            font-size: 1.1em;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            position: relative;
            box-shadow:
                2px 2px 0 rgba(0, 0, 0, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.1);
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            pointer-events: none;
        }

        .mode-btn.auto {
            background: #5cb85c;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .mode-btn.auto.active {
            background: #4cae4c;
            box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.15);
        }

        .mode-btn.manual {
            background: #f0ad4e;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .mode-btn.manual.active {
            background: #ec971f;
            box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.15);
        }

        .reset-btn {
            padding: 12px 30px;
            font-size: 1.1em;
            background: #d0d0d0;
            color: #555;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            box-shadow:
                2px 2px 0 rgba(0, 0, 0, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.1);
        }

        .reset-btn:hover {
            transform: rotate(1deg) scale(1.02);
            background: #c0c0c0;
        }

        /* 数字显示区域 */
        .number-display {
            background: #fffbf0;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 2px 2px 0 rgba(180, 170, 150, 0.3);
            border: 2px solid #e0d8c8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .number-display .label {
            font-size: 1.3em;
            color: #a0826d;
            margin-bottom: 0;
        }

        .number-display .value {
            font-size: 3em;
            color: #8b4513;
            font-weight: bold;
            letter-spacing: 10px;
            margin-bottom: 0;
        }

        /* 输入区域 */
        .input-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group label {
            font-size: 1.2em;
            color: #8b4513;
            font-weight: bold;
        }

        .input-area input {
            padding: 10px 15px;
            font-size: 1.2em;
            border: 3px solid #d4c8b8;
            border-radius: 8px;
            outline: none;
            text-align: center;
            width: 120px;
            background: #ffffff;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #b8a888;
            box-shadow: 0 0 0 3px rgba(180, 170, 150, 0.1);
        }

        .input-area .btn {
            padding: 10px 18px;
            font-size: 1.1em;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            box-shadow:
                2px 2px 0 rgba(0, 0, 0, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.1);
        }

        .input-area .btn:hover {
            transform: rotate(0.5deg) scale(1.02);
        }

        .input-area .set-btn {
            background: #5bc0de;
        }

        .input-area .set-btn:hover {
            background: #31b0d5;
        }

        .input-area .calc-btn {
            background: #e8965a;
        }

        .input-area .calc-btn:hover {
            background: #ec971f;
        }

        /* 等式显示 */
        .equation-display {
            font-size: 1.3em;
            color: #8b4513;
            font-weight: bold;
            text-align: center;
            min-height: 30px;
            flex: 1;
        }

        /* 算珠主容器 */
        .abacus-container {
            background: #fffbf0;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 2px 2px 0 rgba(180, 170, 150, 0.3);
            border: 2px solid #e0d8c8;
            margin-bottom: 30px;
        }

        /* 算珠行 */
        .abacus-row {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 40px;
            position: relative;
        }

        /* 单个算珠列 */
        .bead-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
            padding: 10px;
        }

        /* 算珠列标签 */
        .column-label {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .column-label.wan { background: #ff9800; }
        .column-label.qian { background: #ffc107; }
        .column-label.bai { background: #4caf50; }
        .column-label.shi { background: #f44336; }
        .column-label.ge { background: #2196f3; }

        /* 操作按钮区域 */
        .operation-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .operation-btn {
            padding: 8px 16px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            box-shadow:
                2px 2px 0 rgba(0, 0, 0, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.1);
            min-width: 50px;
        }

        .operation-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.15);
        }

        .operation-btn:active {
            transform: translate(1px, 1px);
        }

        .operation-btn.add {
            background: linear-gradient(135deg, #5cb85c, #4cae4c);
        }

        .operation-btn.subtract {
            background: linear-gradient(135deg, #f0ad4e, #ec971f);
        }

        .operation-btn.carry {
            background: linear-gradient(135deg, #5bc0de, #31b0d5);
        }

        .operation-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 算珠容器 */
        .bead-container {
            position: relative;
            width: 120px;
            min-height: 500px;
            background: linear-gradient(180deg, #8b7355 0%, #a0826d 100%);
            border-radius: 15px;
            padding: 15px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column-reverse;
            gap: 3px;
            border: 4px solid #6b5a45;
        }

        /* 木纹效果 */
        .bead-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50"><rect width="50" height="50" fill="none"/><path d="M0 10 Q25 5 50 10" stroke="%23786550" stroke-width="0.5" fill="none" opacity="0.3"/><path d="M0 30 Q25 25 50 30" stroke="%23786550" stroke-width="0.5" fill="none" opacity="0.3"/></svg>');
            pointer-events: none;
            border-radius: 12px;
        }

        /* 算珠杆 */
        .bead-rod {
            position: absolute;
            top: 10px;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            background: linear-gradient(90deg, #5a4a35 0%, #8b7355 50%, #5a4a35 100%);
            border-radius: 4px;
            z-index: 1;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        /* 单个算珠 */
        .bead {
            width: 80px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow:
                0 4px 8px rgba(0, 0, 0, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.3),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        }

        /* 算珠序号 */
        .bead-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            font-size: 1.1em;
        }

        .bead::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 10%;
            width: 80%;
            height: 40%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, transparent 100%);
            border-radius: 50%;
        }

        .bead::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
        }

        .bead:hover {
            transform: scale(1.05);
            box-shadow:
                0 6px 12px rgba(0, 0, 0, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.3),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        }

        .bead:active {
            transform: scale(0.95);
        }

        /* 算珠颜色 */
        .bead.wan { background: linear-gradient(135deg, #ffb74d 0%, #ff9800 100%); }
        .bead.qian { background: linear-gradient(135deg, #ffca28 0%, #ffc107 100%); }
        .bead.bai { background: linear-gradient(135deg, #66bb6a 0%, #4caf50 100%); }
        .bead.shi { background: linear-gradient(135deg, #ef5350 0%, #f44336 100%); }
        .bead.ge { background: linear-gradient(135deg, #42a5f5 0%, #2196f3 100%); }

        /* 高亮效果 */
        .bead-column.highlight {
            animation: highlight 0.6s ease;
        }

        @keyframes highlight {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 进位源列闪烁效果 */
        .bead-column.carry-source {
            animation: carryOut 1s ease;
        }

        @keyframes carryOut {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); filter: brightness(1.3); }
            50% { transform: scale(1.05); }
            75% { transform: scale(1.1); filter: brightness(1.2); }
            100% { transform: scale(1); }
        }

        /* 进位列接收效果 */
        .bead-column.carry-target {
            animation: carryIn 1s ease;
        }

        @keyframes carryIn {
            0% { transform: scale(1); }
            25% { transform: scale(1.15); filter: brightness(1.5); }
            50% { transform: scale(0.95); }
            75% { transform: scale(1.1); filter: brightness(1.3); }
            100% { transform: scale(1); }
        }

        /* 算珠发光效果 */
        .bead.glow {
            animation: glow 0.8s ease;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow:
                    0 4px 8px rgba(0, 0, 0, 0.3),
                    inset 0 2px 4px rgba(255, 255, 255, 0.3),
                    inset 0 -2px 4px rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow:
                    0 8px 20px rgba(255, 215, 0, 0.8),
                    0 0 30px rgba(255, 215, 0, 0.6),
                    inset 0 2px 4px rgba(255, 255, 255, 0.5),
                    inset 0 -2px 4px rgba(0, 0, 0, 0.2);
                filter: brightness(1.3);
            }
        }

        /* 算珠消失动画 */
        .bead.fade-out {
            animation: fadeOut 1.5s ease forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            30% {
                opacity: 1;
                transform: scale(1.2);
                filter: brightness(1.5);
            }
            100% {
                opacity: 0;
                transform: scale(0) translateY(-50px);
                filter: brightness(2);
            }
        }

        /* 算珠出现动画 */
        .bead.fade-in {
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 进位箭头动画 */
        .carry-arrow {
            position: fixed;
            font-size: 3em;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            z-index: 1000;
            animation: flyArrow 1.5s ease forwards;
            pointer-events: none;
        }

        @keyframes flyArrow {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
        }

        /* 星星粒子效果 */
        .sparkle {
            position: fixed;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 1000;
            animation: sparkleAnim 1s ease forwards;
        }

        @keyframes sparkleAnim {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2) rotate(180deg);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0) rotate(360deg);
            }
        }

        /* 提示消息 */
        .message-container {
            background: #fff3cd;
            border: 3px solid #ffc107;
            border-radius: 15px;
            padding: 20px 30px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0 rgba(180, 170, 150, 0.2);
        }

        .message-text {
            font-size: 1.4em;
            color: #856404;
            font-weight: bold;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .number-display { padding: 15px 20px; gap: 15px; }
            .number-display .value { font-size: 2em; letter-spacing: 5px; }
            .number-display .label { font-size: 1.1em; }
            .bead-container { width: 80px; min-height: 400px; }
            .bead { width: 55px; height: 25px; font-size: 1em; }
            .column-label { font-size: 1.2em; padding: 8px 15px; }
            .abacus-container { padding: 20px; }
            .operation-btn { padding: 6px 12px; font-size: 1em; min-width: 40px; }
        }

        @media (max-width: 480px) {
            .number-display { flex-direction: column; gap: 10px; padding: 15px; }
            .number-display .value { font-size: 1.8em; }
            .number-display .label { font-size: 1em; }
            .bead { width: 45px; height: 20px; font-size: 0.9em; }
            .bead-container { width: 60px; min-height: 350px; gap: 2px; }
            .column-label { font-size: 1em; padding: 5px 10px; }
            .operation-btn { padding: 5px 10px; font-size: 0.9em; min-width: 35px; }
            .operation-buttons { gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>🔢 小学算珠计数器</h1>
            <p>学习十进制进位规则，轻松掌握数学基础</p>
        </div>

        <!-- 数字显示 -->
        <div class="number-display">
            <div class="label">当前数字</div>
            <div class="value" id="numberValue">0</div>
            <div class="equation-display" id="equationDisplay"></div>
            <div class="input-area">
                <input
                    type="number"
                    id="numberInput"
                    placeholder="设置"
                    min="0"
                    max="99999"
                    onkeypress="handleInputKeypress(event)"
                >
                <button class="btn set-btn" onclick="setNumber()">✏️</button>
                <input
                    type="number"
                    id="addInput"
                    placeholder="增加"
                    min="0"
                    max="99999"
                    onkeypress="handleAddKeypress(event)"
                >
                <button class="btn calc-btn" onclick="calculateAdd()">🧮</button>
            </div>
        </div>

        <!-- 算珠区域 -->
        <div class="abacus-container">
            <div class="abacus-row" id="abacusRow">
                <!-- 算珠列将由 JavaScript 动态生成 -->
            </div>
        </div>

        <!-- 提示消息 -->
        <div class="message-container">
            <div class="message-text" id="messageText">👆 点击算珠开始计数吧！</div>
        </div>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let currentMode = 'auto'; // 当前模式：'auto' 或 'manual'
        const MAX_BEADS_AUTO = 10; // 自动模式每列最大算珠数
        const MAX_BEADS_MANUAL = 20; // 手动模式每列最大算珠数

        // 各位名称（从右到左）
        const POSITION_NAMES = ['个', '十', '百', '千', '万'];

        // 各位颜色类名
        const POSITION_CLASSES = ['ge', 'shi', 'bai', 'qian', 'wan'];

        // 各位当前算珠数量（从右到左：个、十、百、千、万）
        let beadCounts = [0, 0, 0, 0, 0];

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            initializeAbacus();
        });

        /**
         * 初始化算珠界面
         */
        function initializeAbacus() {
            const abacusRow = document.getElementById('abacusRow');
            abacusRow.innerHTML = '';

            // 从左到右创建5列（万、千、百、十、个）
            for (let i = 4; i >= 0; i--) {
                const column = createBeadColumn(i);
                abacusRow.appendChild(column);
            }

            updateDisplay();
        }

        /**
         * 创建单个算珠列
         * @param {number} positionIndex 位置索引（0=个，1=十，2=百，3=千，4=万）
         */
        function createBeadColumn(positionIndex) {
            const column = document.createElement('div');
            column.className = 'bead-column';
            column.id = `column-${positionIndex}`;

            // 操作按钮区域（在顶部）
            const buttonContainer = document.createElement('div');
            buttonContainer.className = 'operation-buttons';

            // 加按钮
            const addBtn = document.createElement('button');
            addBtn.className = 'operation-btn add';
            addBtn.textContent = '+';
            addBtn.title = '加一颗';
            addBtn.onclick = () => addBead(positionIndex);
            buttonContainer.appendChild(addBtn);

            // 减按钮
            const subBtn = document.createElement('button');
            subBtn.className = 'operation-btn subtract';
            subBtn.textContent = '-';
            subBtn.title = '减一颗';
            subBtn.onclick = () => subtractBead(positionIndex);
            buttonContainer.appendChild(subBtn);

            // 进位按钮
            const carryBtn = document.createElement('button');
            carryBtn.className = 'operation-btn carry';
            carryBtn.textContent = '进';
            carryBtn.title = '进位（当前位-10，前一位+1）';
            carryBtn.onclick = () => manualCarry(positionIndex);
            buttonContainer.appendChild(carryBtn);

            column.appendChild(buttonContainer);

            // 算珠容器
            const beadContainer = document.createElement('div');
            beadContainer.className = 'bead-container';

            // 算珠杆
            const rod = document.createElement('div');
            rod.className = 'bead-rod';
            beadContainer.appendChild(rod);

            column.appendChild(beadContainer);

            // 列标签（放在算珠容器下面）
            const label = document.createElement('div');
            label.className = `column-label ${POSITION_CLASSES[positionIndex]}`;
            label.textContent = POSITION_NAMES[positionIndex];
            column.appendChild(label);

            return column;
        }

        /**
         * 渲染指定列的算珠
         * @param {number} positionIndex 位置索引
         */
        function renderBeads(positionIndex) {
            const column = document.getElementById(`column-${positionIndex}`);
            const beadContainer = column.querySelector('.bead-container');
            const rod = beadContainer.querySelector('.bead-rod');

            // 清除现有算珠（保留杆）
            const existingBeads = beadContainer.querySelectorAll('.bead');
            existingBeads.forEach(bead => bead.remove());

            // 添加新算珠（插入到杆之前）
            for (let i = 0; i < beadCounts[positionIndex]; i++) {
                const bead = document.createElement('div');
                bead.className = `bead ${POSITION_CLASSES[positionIndex]}`;

                // 显示序号（从下往上，从1开始）
                const beadNumber = document.createElement('span');
                beadNumber.className = 'bead-number';
                beadNumber.textContent = i + 1;
                bead.appendChild(beadNumber);

                bead.onclick = () => handleBeadClick(positionIndex);

                // 将算珠插入到杆之前
                if (rod) {
                    beadContainer.insertBefore(bead, rod);
                } else {
                    beadContainer.appendChild(bead);
                }
            }
        }

        /**
         * 重新渲染所有算珠
         */
        function renderAllBeads() {
            for (let i = 0; i < 5; i++) {
                renderBeads(i);
            }
        }

        // ==================== 交互逻辑 ====================

        /**
         * 加一颗算珠
         * @param {number} positionIndex 位置索引
         */
        function addBead(positionIndex) {
            if (beadCounts[positionIndex] < 99) {
                beadCounts[positionIndex]++;
                renderBeads(positionIndex);
                updateDisplay();
                showMessage(`➕ ${POSITION_NAMES[positionIndex]}位加1颗，现在有${beadCounts[positionIndex]}颗`);
                highlightColumn(positionIndex);
            } else {
                showMessage(`⚠️ ${POSITION_NAMES[positionIndex]}位已经很多了！`);
            }
        }

        /**
         * 减一颗算珠
         * @param {number} positionIndex 位置索引
         */
        function subtractBead(positionIndex) {
            if (beadCounts[positionIndex] > 0) {
                beadCounts[positionIndex]--;
                renderBeads(positionIndex);
                updateDisplay();
                showMessage(`➖ ${POSITION_NAMES[positionIndex]}位减1颗，现在有${beadCounts[positionIndex]}颗`);
                highlightColumn(positionIndex);
            } else {
                showMessage(`⚠️ ${POSITION_NAMES[positionIndex]}位已经是0了，无法减少！`);
            }
        }

        /**
         * 手动进位
         * @param {number} positionIndex 位置索引
         */
        async function manualCarry(positionIndex) {
            if (positionIndex >= 4) {
                showMessage(`⚠️ ${POSITION_NAMES[positionIndex]}位是最高位，无法进位！`);
                return;
            }

            if (beadCounts[positionIndex] < 10) {
                showMessage(`⚠️ ${POSITION_NAMES[positionIndex]}位只有${beadCounts[positionIndex]}颗，不够10颗无法进位！`);
                return;
            }

            // 执行进位
            const beforeCount = beadCounts[positionIndex];
            const beforeNext = beadCounts[positionIndex + 1];

            showMessage(`⏸️ ${POSITION_NAMES[positionIndex]}位有${beforeCount}颗，准备进位...`);
            await sleep(1000);

            // 让10颗算珠渐变消失
            await fadeOutTenBeads(positionIndex);

            // 等待消失动画完成
            await sleep(500);

            // 更新算珠数量
            beadCounts[positionIndex] -= 10;
            beadCounts[positionIndex + 1] += 1;

            console.log(`进位前: ${POSITION_NAMES[positionIndex]}=${beforeCount}, ${POSITION_NAMES[positionIndex + 1]}=${beforeNext}`);
            console.log('进位后算珠数量:', beadCounts);

            // 重新渲染当前位
            renderBeads(positionIndex);

            // 等待一下再渲染前一位，让用户看清变化
            await sleep(300);

            // 渲染前一位（添加新算珠时带淡入动画）
            addBeadWithAnimation(positionIndex + 1);

            // 更新数字显示
            updateDisplay();

            // 在目标列添加进位动画
            const toColumn = document.getElementById(`column-${positionIndex + 1}`);
            if (toColumn) {
                toColumn.classList.add('carry-target');
                await sleep(1000);
                toColumn.classList.remove('carry-target');

                // 在目标列创建星星粒子
                const toRect = toColumn.getBoundingClientRect();
                createSparkles(toRect.left + toRect.width / 2, toRect.top + toRect.height / 2, 8);
            }

            showMessage(`✅ ${POSITION_NAMES[positionIndex]}位去掉10颗，${POSITION_NAMES[positionIndex + 1]}位加1颗！`);
            await sleep(2000);
        }

        /**
         * 添加算珠时带动画
         */
        function addBeadWithAnimation(positionIndex) {
            const column = document.getElementById(`column-${positionIndex}`);

            if (!column) {
                console.error(`列 column-${positionIndex} 不存在！`);
                return;
            }

            const beadContainer = column.querySelector('.bead-container');
            const rod = beadContainer.querySelector('.bead-rod');

            console.log(`渲染列 ${positionIndex}, 应该有 ${beadCounts[positionIndex]} 颗算珠`);

            // 清除现有算珠
            const existingBeads = beadContainer.querySelectorAll('.bead');
            existingBeads.forEach(bead => bead.remove());

            // 添加新算珠
            for (let i = 0; i < beadCounts[positionIndex]; i++) {
                const bead = document.createElement('div');
                bead.className = `bead ${POSITION_CLASSES[positionIndex]}`;

                // 显示序号
                const beadNumber = document.createElement('span');
                beadNumber.className = 'bead-number';
                beadNumber.textContent = i + 1;
                bead.appendChild(beadNumber);

                // 最上面的算珠（最后一个）添加淡入动画
                if (i === beadCounts[positionIndex] - 1) {
                    bead.classList.add('fade-in');
                }

                bead.onclick = () => handleBeadClick(positionIndex);

                // 将算珠插入到杆之前
                if (rod) {
                    beadContainer.insertBefore(bead, rod);
                } else {
                    beadContainer.appendChild(bead);
                }
            }

            console.log(`已渲染 ${beadCounts[positionIndex]} 颗算珠到列 ${positionIndex}`);
        }

        /**
         * 处理算珠点击事件
         * @param {number} positionIndex 位置索引
         */
        function handleBeadClick(positionIndex) {
            console.log('handleBeadClick 被调用，positionIndex:', positionIndex);

            if (positionIndex === undefined || positionIndex === null) {
                console.error('positionIndex 是 undefined！');
                return;
            }

            const maxBeads = currentMode === 'auto' ? MAX_BEADS_AUTO : MAX_BEADS_MANUAL;

            if (beadCounts[positionIndex] < maxBeads) {
                // 增加算珠
                incrementBead(positionIndex);
            } else if (currentMode === 'manual') {
                // 手动模式下，达到最大值时提示手动进位
                showMessage(`📌 ${POSITION_NAMES[positionIndex]}位已满${maxBeads}颗，请手动点击左边一位进行进位操作！`);
                highlightColumn(positionIndex);
            } else {
                // 自动模式下满10自动进位
                autoCarry(positionIndex);
            }
        }

        /**
         * 增加算珠
         * @param {number} positionIndex 位置索引
         */
        function incrementBead(positionIndex) {
            console.log('incrementBead 被调用，positionIndex:', positionIndex);
            beadCounts[positionIndex]++;
            renderBeads(positionIndex);
            updateDisplay();

            // 自动模式下检查是否需要进位
            if (currentMode === 'auto' && beadCounts[positionIndex] >= MAX_BEADS_AUTO) {
                autoCarry(positionIndex);
            }
        }

        /**
         * 自动进位处理
         * @param {number} positionIndex 位置索引
         */
        function autoCarry(positionIndex) {
            if (positionIndex >= 4) {
                showMessage('🎉 已经是最高位了！无法继续进位');
                return;
            }

            // 进位逻辑
            beadCounts[positionIndex] = 0;
            beadCounts[positionIndex + 1]++;

            // 显示进位提示
            showMessage(`📊 ${POSITION_NAMES[positionIndex]}位满10颗，向${POSITION_NAMES[positionIndex + 1]}位进1颗！`);

            // 高亮当前列和进位列
            highlightColumn(positionIndex);
            setTimeout(() => highlightColumn(positionIndex + 1), 300);

            // 重新渲染
            renderAllBeads();
            updateDisplay();

            // 检查是否需要连续进位
            if (currentMode === 'auto' && beadCounts[positionIndex + 1] >= MAX_BEADS_AUTO) {
                setTimeout(() => autoCarry(positionIndex + 1), 600);
            }
        }

        /**
         * 减少算珠（右键点击）
         * @param {number} positionIndex 位置索引
         */
        function decrementBead(positionIndex) {
            if (beadCounts[positionIndex] <= 0) {
                // 需要借位
                if (currentMode === 'auto') {
                    autoBorrow(positionIndex);
                } else {
                    showMessage(`📌 ${POSITION_NAMES[positionIndex]}位已经是0，无法减少！`);
                    highlightColumn(positionIndex);
                }
                return;
            }

            beadCounts[positionIndex]--;
            renderBeads(positionIndex);
            updateDisplay();
        }

        /**
         * 自动借位处理
         * @param {number} positionIndex 位置索引
         */
        function autoBorrow(positionIndex) {
            if (positionIndex >= 4) {
                showMessage('⚠️ 已经是最高位且为0，无法减少！');
                return;
            }

            // 检查高位是否有算珠可借
            if (beadCounts[positionIndex + 1] <= 0) {
                // 高位也是0，递归向更高位借
                autoBorrow(positionIndex + 1);
            }

            // 借位逻辑
            if (beadCounts[positionIndex + 1] > 0) {
                beadCounts[positionIndex + 1]--;
                beadCounts[positionIndex] = MAX_BEADS_AUTO - 1;

                // 显示借位提示
                showMessage(`📊 ${POSITION_NAMES[positionIndex]}位不够，从${POSITION_NAMES[positionIndex + 1]}位借1颗，${POSITION_NAMES[positionIndex]}位变为${MAX_BEADS_AUTO - 1}颗！`);

                // 高亮当前列和借位列
                highlightColumn(positionIndex);
                setTimeout(() => highlightColumn(positionIndex + 1), 300);

                // 重新渲染
                renderAllBeads();
                updateDisplay();
            }
        }

        // ==================== 辅助功能 ====================

        /**
         * 更新数字显示
         */
        function updateDisplay() {
            let total = 0;
            for (let i = 0; i < 5; i++) {
                total += beadCounts[i] * Math.pow(10, i);
            }

            const displayElement = document.getElementById('numberValue');
            displayElement.textContent = total.toLocaleString();
        }

        /**
         * 高亮显示指定列
         * @param {number} positionIndex 位置索引
         */
        function highlightColumn(positionIndex) {
            console.log('highlightColumn 被调用，positionIndex:', positionIndex);

            // 验证 positionIndex
            if (positionIndex === undefined || positionIndex === null || typeof positionIndex !== 'number') {
                console.error('highlightColumn: positionIndex 无效:', positionIndex);
                console.trace('调用栈：');
                return;
            }

            // 检查索引范围
            if (positionIndex < 0 || positionIndex > 4) {
                console.warn(`highlightColumn: positionIndex 超出范围: ${positionIndex}`);
                return;
            }

            const column = document.getElementById(`column-${positionIndex}`);

            // 检查列是否存在
            if (!column) {
                console.warn(`列 column-${positionIndex} 不存在`);
                return;
            }

            column.classList.add('highlight');

            setTimeout(() => {
                column.classList.remove('highlight');
            }, 600);
        }

        /**
         * 显示提示消息
         * @param {string} message 消息内容
         */
        function showMessage(message) {
            const messageElement = document.getElementById('messageText');
            messageElement.textContent = message;

            // 添加动画效果
            messageElement.style.animation = 'none';
            messageElement.offsetHeight; // 触发重排
            messageElement.style.animation = 'highlight 0.3s ease';
        }

        /**
         * 切换模式
         * @param {string} mode 模式：'auto' 或 'manual'
         */
        function setMode(mode) {
            currentMode = mode;

            // 更新按钮状态
            const autoBtn = document.querySelector('.mode-btn.auto');
            const manualBtn = document.querySelector('.mode-btn.manual');

            if (mode === 'auto') {
                autoBtn.classList.add('active');
                manualBtn.classList.remove('active');
                showMessage('🤖 已切换到自动进位模式，每列最多10颗');
            } else {
                manualBtn.classList.add('active');
                autoBtn.classList.remove('active');
                showMessage('✋ 已切换到手动进位模式，每列最多20颗');
            }

            // 重置计数
            resetAll();
        }

        /**
         * 重置所有计数
         */
        function resetAll() {
            beadCounts = [0, 0, 0, 0, 0];
            renderAllBeads();
            updateDisplay();
            showMessage('🔄 已重置归零，重新开始计数吧！');
            document.getElementById('numberInput').value = '';
        }

        /**
         * 设置指定数字（从输入框）
         */
        function setNumber() {
            const input = document.getElementById('numberInput');

            // 检查输入框是否有值
            if (!input.value) {
                console.log('setNumber 被调用但输入框为空，跳过');
                return;
            }

            let number = parseInt(input.value);

            console.log('========== setNumber 开始 ==========');
            console.log('输入值:', input.value, '解析后:', number);

            // 验证输入
            if (!input.value || input.value.trim() === '') {
                showMessage('⚠️ 请输入数字！');
                return;
            }

            if (isNaN(number)) {
                showMessage('⚠️ 请输入有效的数字！');
                return;
            }

            if (number < 0) {
                showMessage('⚠️ 数字不能为负数！');
                return;
            }

            if (number > 99999) {
                showMessage('⚠️ 数字不能超过 99999！');
                return;
            }

            // 计算各位的算珠数量
            for (let i = 0; i < 5; i++) {
                const divisor = Math.pow(10, i);
                beadCounts[i] = Math.floor((number / divisor)) % 10;
            }

            console.log('设置数字:', number);
            console.log('算珠数量:', beadCounts);

            // 重新渲染
            console.log('开始调用 renderAllBeads()');
            renderAllBeads();
            console.log('renderAllBeads() 完成');

            updateDisplay();
            clearEquation();
            showMessage(`✏️ 已设置数字为 ${number.toLocaleString()}`);

            console.log('========== setNumber 结束 ==========');

            // 清空输入框
            input.value = '';
        }

        /**
         * 处理输入框回车键
         */
        function handleInputKeypress(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                event.stopPropagation(); // 阻止事件冒泡
                console.log('回车键触发，调用 setNumber');
                setNumber();
                return false;
            }
        }

        /**
         * 处理增加输入框回车键
         */
        function handleAddKeypress(event) {
            if (event.key === 'Enter') {
                calculateAdd();
            }
        }

        /**
         * 计算加法并演示进位过程
         */
        function calculateAdd() {
            const input = document.getElementById('addInput');
            let addNumber = parseInt(input.value);

            // 验证输入
            if (isNaN(addNumber)) {
                showMessage('⚠️ 请输入有效的数字！');
                return;
            }

            if (addNumber < 0) {
                showMessage('⚠️ 增加的数字不能为负数！');
                return;
            }

            if (addNumber > 99999) {
                showMessage('⚠️ 增加的数字不能超过 99999！');
                return;
            }

            // 获取当前数字
            let currentNumber = 0;
            for (let i = 0; i < 5; i++) {
                currentNumber += beadCounts[i] * Math.pow(10, i);
            }

            const resultNumber = currentNumber + addNumber;

            if (resultNumber > 99999) {
                showMessage('⚠️ 结果超过 99999，无法计算！');
                return;
            }

            // 显示等式
            showEquation(currentNumber, addNumber, resultNumber);

            // 开始逐步演示加法过程
            demonstrateAddition(currentNumber, addNumber, resultNumber);

            // 清空输入框
            input.value = '';
        }

        /**
         * 显示加法等式
         */
        function showEquation(current, add, result) {
            const equationDisplay = document.getElementById('equationDisplay');
            equationDisplay.innerHTML = `${current} + ${add} = <span style="color: #e84393;">${result}</span>`;
        }

        /**
         * 清除等式显示
         */
        function clearEquation() {
            const equationDisplay = document.getElementById('equationDisplay');
            equationDisplay.innerHTML = '';
        }

        /**
         * 逐步演示加法进位过程
         */
        async function demonstrateAddition(current, add, result) {
            showMessage('🧮 开始计算加法...');

            // 临时保存当前算珠状态
            const tempCounts = [...beadCounts];

            // 将增加的数字分解到各位
            const addDigits = [];
            for (let i = 0; i < 5; i++) {
                addDigits[i] = Math.floor((add / Math.pow(10, i))) % 10;
            }

            // 第一步：累加所有位（不进位，可以超过10）
            for (let position = 0; position < 5; position++) {
                if (addDigits[position] === 0) continue;

                // 等待一下
                await sleep(1500);

                // 显示当前位要加的数量
                showMessage(`➕ ${POSITION_NAMES[position]}位加 ${addDigits[position]} 颗`);

                // 高亮当前位
                highlightColumn(position);

                // 逐步添加算珠
                for (let count = 1; count <= addDigits[position]; count++) {
                    await sleep(800);

                    beadCounts[position]++;

                    // 更新显示（不检查进位，让算珠可以超过10）
                    renderBeads(position);
                    updateDisplay();
                }

                // 每位加完后暂停一下
                await sleep(1000);
            }

            // 第二步：统一处理进位
            showMessage('📊 所有位数加完了，现在处理进位...');
            await sleep(2000);

            await processAllCarries();

            showMessage(`✅ 计算完成！结果为 ${result.toLocaleString()}`);
        }

        /**
         * 处理所有进位（从低位到高位）
         */
        async function processAllCarries() {
            // 从个位开始，逐位检查是否需要进位
            for (let position = 0; position < 4; position++) {
                // 当前列如果有10颗或更多，需要进位
                while (beadCounts[position] >= 10) {
                    await performSingleCarry(position);
                }
            }
        }

        /**
         * 执行单次进位（10颗消失，高位+1）
         */
        async function performSingleCarry(fromIndex) {
            const toIndex = fromIndex + 1;
            const fromColumn = document.getElementById(`column-${fromIndex}`);
            const toColumn = document.getElementById(`column-${toIndex}`);

            showMessage(`⏸️ ${POSITION_NAMES[fromIndex]}位有${beadCounts[fromIndex]}颗，需要进位...`);
            await sleep(1500);

            // 高亮源列
            fromColumn.classList.add('carry-source');
            await sleep(800);
            fromColumn.classList.remove('carry-source');

            // 让10颗算珠渐变消失
            showMessage(`💫 ${POSITION_NAMES[fromIndex]}位的10颗算珠将要消失...`);
            await sleep(1000);

            await fadeOutTenBeads(fromIndex);

            // 等待消失动画完成
            await sleep(500);

            // 更新算珠数量
            beadCounts[fromIndex] -= 10;
            beadCounts[toIndex] += 1;

            // 重新渲染
            renderBeads(fromIndex);
            renderBeads(toIndex);
            updateDisplay();

            // 在目标列添加进位动画
            toColumn.classList.add('carry-target');
            await sleep(1000);
            toColumn.classList.remove('carry-target');

            // 在目标列创建星星粒子
            const toRect = toColumn.getBoundingClientRect();
            createSparkles(toRect.left + toRect.width / 2, toRect.top + toRect.height / 2, 8);

            showMessage(`📊 ${POSITION_NAMES[fromIndex]}位去掉10颗，${POSITION_NAMES[toIndex]}位加1颗！`);
            await sleep(2000);
        }

        /**
         * 让10颗算珠渐变消失
         */
        async function fadeOutTenBeads(positionIndex) {
            const column = document.getElementById(`column-${positionIndex}`);
            const beadContainer = column.querySelector('.bead-container');
            const beads = beadContainer.querySelectorAll('.bead');

            // 只需要让10颗算珠消失（取最后10颗）
            const beadsToFade = Array.from(beads).slice(-10);

            // 给每颗算珠添加消失动画，稍微错开时间
            for (let i = 0; i < beadsToFade.length; i++) {
                const bead = beadsToFade[i];
                bead.classList.add('fade-out');

                // 在每颗算珠位置创建小星星
                setTimeout(() => {
                    const rect = bead.getBoundingClientRect();
                    createSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 3);
                }, i * 100);

                await sleep(100);
            }

            // 等待所有消失动画完成
            await sleep(800);
        }

        /**
         * 创建星星粒子效果
         */
        function createSparkles(x, y, count) {
            for (let i = 0; i < count; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.innerHTML = '⭐';
                sparkle.style.left = (x + (Math.random() - 0.5) * 100) + 'px';
                sparkle.style.top = (y + (Math.random() - 0.5) * 100) + 'px';
                sparkle.style.fontSize = (15 + Math.random() * 20) + 'px';
                document.body.appendChild(sparkle);

                // 动画结束后移除
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        /**
         * 元素动画辅助函数
         */
        function animateElement(element, keyframes, duration) {
            return new Promise(resolve => {
                const animation = element.animate(keyframes, {
                    duration: duration,
                    easing: 'ease-in-out'
                });
                animation.onfinish = resolve;
            });
        }

        /**
         * 处理连续进位（保留以兼容其他功能）
         */
        async function handleContinuousCarry(startPosition) {
            let currentPos = startPosition;

            while (currentPos < 4 && beadCounts[currentPos] >= MAX_BEADS_AUTO) {
                await performSingleCarry(currentPos);
                currentPos++;
            }
        }

        /**
         * 延时函数
         */
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ==================== 键盘快捷键 ====================
        document.addEventListener('keydown', function(event) {
            // 如果在输入框中，不触发快捷键
            if (event.target.tagName === 'INPUT') {
                return;
            }

            if (event.key === 'r' || event.key === 'R') {
                resetAll();
            } else if (event.key === '1') {
                setMode('auto');
            } else if (event.key === '2') {
                setMode('manual');
            }
        });
    </script>
</body>
</html>
