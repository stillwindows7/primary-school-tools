<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>口算练习 - 小学生趣味数学</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background: linear-gradient(135deg, #E0F7FA 0%, #B2EBF2 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 浮动装饰背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(74, 144, 217, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(126, 211, 33, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 50% 50%, rgba(255, 217, 61, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* 头部导航 */
        .header {
            background: linear-gradient(135deg, #4A90D9 0%, #357ABD 100%);
            padding: 15px 20px;
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.3);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #FFF;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-3px);
        }

        .header h1 {
            font-size: 1.5em;
            color: #FFF;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #FFF;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* 主容器 */
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px 40px;
            position: relative;
            z-index: 1;
        }

        /* 视图容器 */
        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== 首页视图 ==================== */
        .home-view {
            text-align: center;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .user-avatar {
            font-size: 4em;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFD93D 0%, #FFC107 100%);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(255, 217, 61, 0.4);
        }

        .user-details h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 4px;
        }

        .user-details p {
            color: #666;
            font-size: 1em;
        }

        .score-display {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .score-item {
            text-align: center;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #4A90D9;
        }

        .score-label {
            font-size: 0.9em;
            color: #666;
        }

        .mode-selection {
            margin-top: 30px;
        }

        .section-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 16px;
            font-weight: bold;
        }

        /* 年级选择卡片 */
        .grade-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .grade-card {
            background: linear-gradient(135deg, #FFF 0%, #F5F5F5 100%);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .grade-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .grade-card.selected {
            border-color: #4A90D9;
            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
        }

        .grade-icon {
            font-size: 2.5em;
            margin-bottom: 8px;
        }

        .grade-name {
            font-size: 1.1em;
            color: #333;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .grade-desc {
            font-size: 0.85em;
            color: #666;
        }

        /* 模式选择卡片 */
        .mode-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .mode-card {
            background: linear-gradient(135deg, #FFF 0%, #F5F5F5 100%);
            border-radius: 16px;
            padding: 24px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .mode-card.selected {
            border-color: #7ED321;
            background: linear-gradient(135deg, #F1F8E9 0%, #DCEDC8 100%);
        }

        .mode-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .mode-name {
            font-size: 1.1em;
            color: #333;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .mode-desc {
            font-size: 0.8em;
            color: #666;
        }

        /* 难度选择 */
        .difficulty-selector {
            margin: 20px 0;
        }

        .difficulty-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .diff-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .diff-btn.easy {
            background: #E8F5E9;
            color: #7ED321;
        }

        .diff-btn.medium {
            background: #FFF9E6;
            color: #FFD93D;
        }

        .diff-btn.hard {
            background: #FFEBEE;
            color: #FF6B6B;
        }

        .diff-btn:hover {
            transform: scale(1.05);
        }

        .diff-btn.selected {
            box-shadow: 0 0 0 3px currentColor;
        }

        /* 开始按钮 */
        .start-btn {
            background: linear-gradient(135deg, #7ED321 0%, #68A50D 100%);
            color: #FFF;
            border: none;
            padding: 16px 60px;
            border-radius: 16px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 24px;
            box-shadow: 0 6px 20px rgba(126, 211, 33, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(126, 211, 33, 0.5);
        }

        .start-btn:active {
            transform: translateY(-1px);
        }

        /* 模式选项 */
        .mode-options {
            display: none;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
        }

        .mode-options.active {
            display: block;
        }

        .mode-options h4 {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 12px;
        }

        .option-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 10px 20px;
            border: 2px solid #4A90D9;
            border-radius: 10px;
            background: #FFF;
            color: #4A90D9;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: #E3F2FD;
        }

        .option-btn.selected {
            background: #4A90D9;
            color: #FFF;
        }

        /* ==================== 练习视图 ==================== */
        .practice-view {
            text-align: center;
        }

        .practice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .progress-info {
            font-size: 1.1em;
            color: #333;
            font-weight: bold;
        }

        .timer {
            font-size: 1.3em;
            color: #FF6B6B;
            font-weight: bold;
        }

        /* 连击显示 */
        .streak-display {
            position: fixed;
            top: 80px;
            right: 20px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            color: #FFF;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
            z-index: 50;
        }

        .streak-display.show {
            opacity: 1;
            transform: scale(1);
        }

        /* 题目显示 */
        .question-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        /* 陪伴角色 */
        .companion {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 3em;
            opacity: 0.3;
        }

        .question {
            font-size: 4em;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 4px;
        }

        .question.correct {
            animation: correctAnswer 0.5s ease;
        }

        .question.wrong {
            animation: wrongAnswer 0.5s ease;
        }

        @keyframes correctAnswer {
            0% { transform: scale(1); color: #333; }
            50% { transform: scale(1.2); color: #7ED321; }
            100% { transform: scale(1); color: #333; }
        }

        @keyframes wrongAnswer {
            0%, 100% { transform: translateX(0); color: #333; }
            25% { transform: translateX(-20px); color: #FF6B6B; }
            75% { transform: translateX(20px); color: #FF6B6B; }
        }

        /* 鼓励语 */
        .encouragement {
            font-size: 1.5em;
            color: #4A90D9;
            font-weight: bold;
            margin: 20px 0;
            min-height: 40px;
        }

        /* 答案输入区域 */
        .answer-section {
            margin-top: 30px;
        }

        .answer-input {
            width: 200px;
            padding: 15px 20px;
            font-size: 2em;
            text-align: center;
            border: 3px solid #4A90D9;
            border-radius: 16px;
            font-weight: bold;
            color: #333;
            outline: none;
            transition: all 0.3s ease;
        }

        .answer-input:focus {
            box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.2);
        }

        .answer-input.correct {
            border-color: #7ED321;
            background: #E8F5E9;
            color: #7ED321;
        }

        .answer-input.wrong {
            border-color: #FF6B6B;
            background: #FFEBEE;
            color: #FF6B6B;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 数字键盘 */
        .number-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 300px;
            margin: 20px auto 0;
        }

        .num-btn {
            background: linear-gradient(135deg, #4A90D9 0%, #357ABD 100%);
            color: #FFF;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(74, 144, 217, 0.3);
            transition: all 0.2s ease;
        }

        .num-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(74, 144, 217, 0.4);
        }

        .num-btn:active {
            transform: translateY(-1px);
        }

        .num-btn.clear {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
        }

        .num-btn.submit {
            background: linear-gradient(135deg, #7ED321 0%, #68A50D 100%);
            box-shadow: 0 4px 10px rgba(126, 211, 33, 0.3);
        }

        .num-btn.voice {
            background: linear-gradient(135deg, #A78BFA 0%, #9C27B0 100%);
            box-shadow: 0 4px 10px rgba(167, 139, 250, 0.3);
        }

        /* 停止按钮 */
        .stop-btn {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            color: #FFF;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            transition: all 0.3s ease;
        }

        .stop-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        /* ==================== 结果视图 ==================== */
        .result-view {
            text-align: center;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 2em;
            color: #4A90D9;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
            padding: 20px;
            border-radius: 16px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #4A90D9;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .new-badges {
            background: linear-gradient(135deg, #FFF9E6 0%, #FFECB3 100%);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .new-badges h4 {
            font-size: 1.2em;
            color: #FF8F00;
            margin-bottom: 15px;
        }

        .badge-list {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .badge-item {
            background: #FFF;
            padding: 10px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .badge-icon {
            font-size: 1.8em;
        }

        .badge-name {
            font-weight: bold;
            color: #333;
        }

        /* 错题展示 */
        .wrong-questions {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .wrong-questions h4 {
            font-size: 1.2em;
            color: #FF6B6B;
            margin-bottom: 15px;
        }

        .wrong-item {
            background: #FFEBEE;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wrong-content {
            text-align: left;
        }

        .wrong-question {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
        }

        .wrong-answer {
            color: #FF6B6B;
            margin-top: 5px;
        }

        .retry-btn {
            background: #4A90D9;
            color: #FFF;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            background: #357ABD;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .action-btn {
            padding: 14px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #7ED321 0%, #68A50D 100%);
            color: #FFF;
            box-shadow: 0 4px 15px rgba(126, 211, 33, 0.3);
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, #4A90D9 0%, #357ABD 100%);
            color: #FFF;
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        /* ==================== 闯关视图 ==================== */
        .level-view {
            text-align: center;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .level-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .level-card.locked::after {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
        }

        .level-card:not(.locked):hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .level-card.completed {
            border: 3px solid #7ED321;
        }

        .level-number {
            font-size: 2em;
            font-weight: bold;
            color: #4A90D9;
            margin-bottom: 5px;
        }

        .level-name {
            font-size: 0.85em;
            color: #333;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .level-stars {
            font-size: 1.2em;
            margin-top: 5px;
        }

        .level-stars .star {
            color: #FFD93D;
        }

        .level-stars .star.empty {
            color: #E0E0E0;
        }

        /* ==================== 个人中心视图 ==================== */
        .profile-view {
            text-align: center;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .profile-avatar-section {
            margin-bottom: 30px;
        }

        .current-avatar {
            font-size: 6em;
            margin-bottom: 15px;
        }

        .nickname-input {
            padding: 10px 20px;
            font-size: 1.2em;
            border: 2px solid #4A90D9;
            border-radius: 10px;
            text-align: center;
            width: 200px;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .summary-item {
            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
            padding: 15px;
            border-radius: 12px;
        }

        .summary-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #4A90D9;
        }

        .summary-label {
            font-size: 0.8em;
            color: #666;
        }

        /* 勋章墙 */
        .badge-wall {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .badge-wall h4 {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
        }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .badge-cell {
            background: #FFF;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .badge-cell.earned {
            opacity: 1;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .badge-cell .icon {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .settings-section h4 {

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;

        .toggle-slider:before {
            position: absolute;
            content: '';
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #7ED321;

        input:checked + .toggle-slider:before {
            transform: translateX(24px);

        .clear-btn {

        /* 响应式 */
        @media (max-width: 768px) {

    </style>

<body>
    <div class="header">

    <!-- 引入数据配置 -->
    <script src="math-practice-data.js"></script>

    <script>
        // ==================== 全局状态 ====================
        const state = {
            // 用户设置
            grade: 'grade1',
            mode: 'practice',
            difficulty: 'easy',
            timedOption: 60,
            countOption: 10,

            // 用户数据
            nickname: '',
            avatar: '🐻',
            score: 0,
            totalQuestions: 0,
            totalCorrect: 0,
            maxStreak: 0,

            // 当前练习
            currentQuestion: null,
            currentAnswer: '',
            questionCount: 0,
            correctCount: 0,
            streak: 0,
            startTime: null,
            timer: null,
            timeLeft: 0,

            // 闯关数据
            currentLevel: 1,
            levelsCompleted: {},

            // 收集的数据
            earnedBadges: [],
            wrongQuestions: [],

            // 设置
            soundEnabled: true,
            voiceEnabled: false,

            // 陪伴角色
            companion: 'none'
        };

        // ==================== 初始化 ====================
        function init() {
            // 检查数据文件是否加载成功
            if (typeof mathConfig === 'undefined') {
                alert('数据文件加载失败，请刷新页面重试！');
                console.error('mathConfig 未定义，请检查 math-practice-data.js 是否正确加载');
                return;
            }

            if (typeof gradeConfig === 'undefined') {
                alert('数据文件加载失败，请刷新页面重试！');
                console.error('gradeConfig 未定义，请检查 math-practice-data.js 是否正确加载');
                return;
            }

            console.log('数据加载成功', { mathConfig, gradeConfig, badges });

            loadSession();
            updateUserInfo();
            setupEventListeners();
            renderBadgeWall();
        }

        function loadSession() {
            const saved = sessionStorage.getItem('mathPractice');
            if (saved) {
                const data = JSON.parse(saved);
                Object.assign(state, data);
            }

            // 生成随机昵称
            if (!state.nickname) {
                state.nickname = randomNicknames[Math.floor(Math.random() * randomNicknames.length)];
            }
        }

        function saveSession() {
            const dataToSave = {
                grade: state.grade,
                nickname: state.nickname,
                avatar: state.avatar,
                score: state.score,
                totalQuestions: state.totalQuestions,
                totalCorrect: state.totalCorrect,
                maxStreak: state.maxStreak,
                earnedBadges: state.earnedBadges,
                levelsCompleted: state.levelsCompleted,
                wrongQuestions: state.wrongQuestions,
                soundEnabled: state.soundEnabled,
                voiceEnabled: state.voiceEnabled,
                companion: state.companion
            };
            sessionStorage.setItem('mathPractice', JSON.stringify(dataToSave));
        }

        function updateUserInfo() {
            document.getElementById('userAvatar').textContent = state.avatar;
            document.getElementById('userNameDisplay').textContent = state.nickname;
            document.getElementById('userGradeDisplay').textContent = gradeConfig[state.grade].name;
            document.getElementById('totalScore').textContent = state.score;
            document.getElementById('totalQuestions').textContent = state.totalQuestions;

            // 个人中心
            document.getElementById('profileAvatar').textContent = state.avatar;
            document.getElementById('nicknameInput').value = state.nickname;
            document.getElementById('profileScore').textContent = state.score;
            document.getElementById('profileQuestions').textContent = state.totalQuestions;
            document.getElementById('profileAccuracy').textContent =
                state.totalQuestions > 0 ? Math.round((state.totalCorrect / state.totalQuestions) * 100) + '%' : '0%';
            document.getElementById('profileStreak').textContent = state.maxStreak;

            // 设置开关
            document.getElementById('soundToggle').checked = state.soundEnabled;
            document.getElementById('voiceToggle').checked = state.voiceEnabled;

            // 陪伴角色
            document.getElementById('companion').textContent =
                state.companion !== 'none' ? companions.find(c => c.id === state.companion)?.icon || '' : '';
        }

        function setupEventListeners() {
            // 昵称修改
            document.getElementById('nicknameInput').addEventListener('change', (e) => {
                state.nickname = e.target.value || state.nickname;
                saveSession();
                updateUserInfo();
            });

            // 音效开关
            document.getElementById('soundToggle').addEventListener('change', (e) => {
                state.soundEnabled = e.target.checked;
                saveSession();
            });

            // 语音开关
            document.getElementById('voiceToggle').addEventListener('change', (e) => {
                state.voiceEnabled = e.target.checked;
                saveSession();
            });

            // 回车提交
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && document.getElementById('practiceView').classList.contains('active')) {
                    submitAnswer();
                }
            });
        }

        // ==================== 视图切换 ====================
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewName + 'View').classList.add('active');

            if (viewName === 'level') {
                renderLevelGrid();
            }
        }

        function goHome() {
            stopPractice();
            showView('home');
        }

        // ==================== 选择逻辑 ====================
        function selectGrade(grade) {
            state.grade = grade;
            document.querySelectorAll('.grade-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[data-grade="${grade}"]`).classList.add('selected');
            updateUserInfo();
        }

        function selectMode(mode) {
            state.mode = mode;
            document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[data-mode="${mode}"]`).classList.add('selected');

            // 显示/隐藏选项
            document.getElementById('timedOptions').classList.remove('active');
            document.getElementById('countOptions').classList.remove('active');
            document.getElementById('difficultySelector').style.display = mode === 'practice' ? 'block' : 'none';

            if (mode === 'level') {
                showView('level');
            }
        }

        function selectDifficulty(difficulty) {
            state.difficulty = difficulty;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector(`.diff-btn.${difficulty}`).classList.add('selected');
        }

        function selectTimedOption(value) {
            state.timedOption = value;
            document.querySelectorAll('#timedBtns .option-btn').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function selectCountOption(value) {
            state.countOption = value;
            document.querySelectorAll('#countBtns .option-btn').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        // ==================== 题目生成 ====================
        function generateQuestion() {
            // 确保数据已加载
            if (!mathConfig || !mathConfig[state.grade] || !mathConfig[state.grade][state.difficulty]) {
                console.error('数据配置未加载，使用默认配置');
                // 使用默认配置
                return {
                    num1: 5,
                    num2: 3,
                    answer: 8,
                    question: '5 + 3 = ?',
                    type: 'add'
                };
            }

            const config = mathConfig[state.grade][state.difficulty];
            const questionType = config[Math.floor(Math.random() * config.length)];

            let num1, num2, answer, question;

            switch (questionType.type) {
                case 'add':
                    num1 = randomInRange(questionType.range[0], questionType.range[1]);
                    num2 = randomInRange(questionType.range[0], questionType.range[1]);
                    if (questionType.onlyTen) {
                        num1 = Math.round(num1 / 10) * 10 || 10;
                        num2 = Math.round(num2 / 10) * 10 || 10;
                    }
                    answer = num1 + num2;
                    question = `${num1} + ${num2} = ?`;
                    break;

                case 'sub':
                    num1 = randomInRange(questionType.range[0], questionType.range[1]);
                    num2 = randomInRange(questionType.range[0], questionType.range[1]);
                    if (questionType.onlyTen) {
                        num1 = Math.round(num1 / 10) * 10 || 10;
                        num2 = Math.round(num2 / 10) * 10 || 10;
                    }
                    // 确保结果非负
                    if (num1 < num2) [num1, num2] = [num2, num1];
                    answer = num1 - num2;
                    question = `${num1} - ${num2} = ?`;
                    break;

                case 'mul':
                    num1 = randomInRange(questionType.range[0], questionType.range[1]);
                    num2 = randomInRange(questionType.range[0], questionType.range[1]);
                    answer = num1 * num2;
                    question = `${num1} × ${num2} = ?`;
                    break;

                case 'div':
                    num2 = randomInRange(questionType.range[0], questionType.range[1]);
                    answer = randomInRange(questionType.range[0], questionType.range[1]);
                    num1 = num2 * answer;
                    question = `${num1} ÷ ${num2} = ?`;
                    break;

                case 'mixed':
                    // 随机选择前面的类型
                    return generateQuestion();
            }

            return { num1, num2, answer, question, type: questionType.type };
        }

        function randomInRange(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // ==================== 练习逻辑 ====================
        function startPractice() {
            console.log('startPractice 被调用', { grade: state.grade, difficulty: state.difficulty });

            // 再次检查数据是否已加载
            if (typeof mathConfig === 'undefined') {
                alert('数据文件未加载，请刷新页面重试！');
                return;
            }

            state.questionCount = 0;
            state.correctCount = 0;
            state.streak = 0;
            state.currentAnswer = '';
            state.startTime = Date.now();
            state.wrongQuestions = [];

            // 清空输入
            document.getElementById('answerInput').value = '';
            document.getElementById('encouragement').textContent = '';

            // 生成第一题
            nextQuestion();

            showView('practice');

            // 启动计时器
            if (state.mode === 'timed') {
                state.timeLeft = state.timedOption;
                startTimer();
            } else {
                updateTimerDisplay();
                state.timer = setInterval(updateTimerDisplay, 1000);
            }
        }

        function nextQuestion() {
            state.currentQuestion = generateQuestion();
            state.currentAnswer = '';
            document.getElementById('question').textContent = state.currentQuestion.question;
            document.getElementById('question').classList.remove('correct', 'wrong');
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').classList.remove('correct', 'wrong');
            document.getElementById('encouragement').textContent = '';
            document.getElementById('progressText').textContent = `第 ${state.questionCount + 1} 题`;
        }

        function inputNumber(num) {
            const input = document.getElementById('answerInput');
            if (state.currentAnswer.length < 5) {
                state.currentAnswer += num;
                input.value = state.currentAnswer;
                input.classList.remove('correct', 'wrong');
            }
        }

        function clearAnswer() {
            state.currentAnswer = '';
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').classList.remove('correct', 'wrong');
        }

        function submitAnswer() {
            if (!state.currentAnswer && state.currentAnswer !== 0) return;

            const userAnswer = parseInt(state.currentAnswer);
            const correctAnswer = state.currentQuestion.answer;
            const isCorrect = userAnswer === correctAnswer;

            state.questionCount++;
            state.totalQuestions++;

            const questionEl = document.getElementById('question');
            const inputEl = document.getElementById('answerInput');

            if (isCorrect) {
                // 答对
                state.correctCount++;
                state.totalCorrect++;
                state.streak++;
                if (state.streak > state.maxStreak) state.maxStreak = state.streak;

                // 计分
                let score = scoreRules.correct;
                if (state.streak >= 3) score += scoreRules.streak3;
                if (state.streak >= 5) score += scoreRules.streak5;
                if (state.streak >= 10) score += scoreRules.streak10;
                state.score += score;
                document.getElementById('scoreText').textContent = `积分: ${state.score}`;

                // 视觉反馈
                questionEl.classList.add('correct');
                inputEl.classList.add('correct');

                // 鼓励语
                const encouragementsList = encouragements.correct;
                document.getElementById('encouragement').textContent =
                    encouragementsList[Math.floor(Math.random() * encouragementsList.length)];

                // 连击显示
                if (state.streak >= 3 && encouragements.streak[state.streak]) {
                    showStreak(encouragements.streak[state.streak]);
                }

                playSound('correct');

                // 检查勋章
                checkBadges();

                // 延迟后下一题
                setTimeout(() => {
                    if (shouldContinue()) {
                        nextQuestion();
                    } else {
                        finishPractice();
                    }
                }, 1000);

            } else {
                // 答错
                state.streak = 0;

                // 记录错题
                state.wrongQuestions.push({
                    question: state.currentQuestion.question,
                    userAnswer: userAnswer,
                    correctAnswer: correctAnswer
                });

                // 视觉反馈
                questionEl.classList.add('wrong');
                inputEl.classList.add('wrong');

                // 鼓励语
                const encouragementsList = encouragements.wrong;
                document.getElementById('encouragement').textContent =
                    encouragementsList[Math.floor(Math.random() * encouragementsList.length)];

                playSound('wrong');

                // 延迟后继续
                setTimeout(() => {
                    if (shouldContinue()) {
                        nextQuestion();
                    } else {
                        finishPractice();
                    }
                }, 1500);
            }

            saveSession();
        }

        function shouldContinue() {
            if (state.mode === 'count') {
                return state.questionCount < state.countOption;
            }
            if (state.mode === 'timed') {
                return state.timeLeft > 0;
            }
            return true; // 自由模式
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            state.timer = setInterval(() => {
                state.timeLeft--;
                const minutes = Math.floor(state.timeLeft / 60);
                const seconds = state.timeLeft % 60;
                timerEl.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                if (state.timeLeft <= 0) {
                    finishPractice();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('timer').textContent =
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function showStreak(text) {
            const streakEl = document.getElementById('streakDisplay');
            streakEl.textContent = text;
            streakEl.classList.add('show');
            setTimeout(() => streakEl.classList.remove('show'), 2000);
        }

        function stopPractice() {
            if (state.timer) {
                clearInterval(state.timer);
                state.timer = null;
            }
        }

        function finishPractice() {
            stopPractice();

            const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const accuracy = state.questionCount > 0
                ? Math.round((state.correctCount / state.questionCount) * 100)
                : 0;

            // 显示结果
            document.getElementById('resultCount').textContent = state.questionCount;
            document.getElementById('resultCorrect').textContent = state.correctCount;
            document.getElementById('resultAccuracy').textContent = accuracy + '%';
            document.getElementById('resultTime').textContent =
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            // 新获得的勋章
            const newBadges = checkNewBadges();
            if (newBadges.length > 0) {
                document.getElementById('newBadgesSection').style.display = 'block';
                document.getElementById('newBadgesList').innerHTML = newBadges.map(badge =>
                    `<div class="badge-item">
                        <span class="badge-icon">${badge.icon}</span>
                        <span class="badge-name">${badge.name}</span>
                    </div>`
                ).join('');
            } else {
                document.getElementById('newBadgesSection').style.display = 'none';
            }

            // 错题展示
            if (state.wrongQuestions.length > 0) {
                document.getElementById('wrongQuestionsSection').style.display = 'block';
                document.getElementById('wrongQuestionsList').innerHTML = state.wrongQuestions.map((q, i) =>
                    `<div class="wrong-item">
                        <div class="wrong-content">
                            <div class="wrong-question">${q.question}</div>
                            <div class="wrong-answer">你的答案: ${q.userAnswer} | 正确答案: ${q.correctAnswer}</div>
                        </div>
                    </div>`
                ).join('');
            } else {
                document.getElementById('wrongQuestionsSection').style.display = 'none';
            }

            saveSession();
            showView('result');
        }

        // ==================== 勋章系统 ====================
        function checkBadges() {
            // 初学者
            if (state.totalQuestions === 1) earnBadge('first');
            if (state.totalQuestions >= 10) earnBadge('ten');
            if (state.totalQuestions >= 50) earnBadge('fifty');
            if (state.totalQuestions >= 100) earnBadge('hundred');

            // 连击
            if (state.streak >= 3) earnBadge('streak3');
            if (state.streak >= 5) earnBadge('streak5');
            if (state.streak >= 10) earnBadge('streak10');
            if (state.streak >= 20) earnBadge('streak20');

            // 准确率
            if (state.questionCount >= 5) {
                const accuracy = (state.correctCount / state.questionCount) * 100;
                if (accuracy >= 90) earnBadge('accuracy90');
                if (accuracy === 100) earnBadge('accuracy100');
            }
        }

        function checkNewBadges() {
            return state.earnedBadges.filter(badge =>
                badges.find(b => b.id === badge && !badge.seen)
            );
        }

        function earnBadge(badgeId) {
            if (!state.earnedBadges.includes(badgeId)) {
                state.earnedBadges.push(badgeId);
            }
        }

        function renderBadgeWall() {
            const badgeWall = document.getElementById('badgeWall');
            badgeWall.innerHTML = badges.map(badge => {
                const earned = state.earnedBadges.includes(badge.id);
                const rarity = badgeRarity[badge.rarity];
                return `
                    <div class="badge-cell ${earned ? 'earned' : ''}" title="${badge.name}: ${badge.desc}">
                        <div class="icon">${badge.icon}</div>
                        <div class="name">${badge.name}</div>
                    </div>
                `;
            }).join('');
        }

        function clearWrongQuestions() {
            if (confirm('确定要清除所有错题记录吗？')) {
                state.wrongQuestions = [];
                saveSession();
                alert('错题记录已清除！');
            }
        }

        // ==================== 闯关系统 ====================
        function renderLevelGrid() {
            const grid = document.getElementById('levelGrid');
            const levels = levelConfig[state.grade];

            document.getElementById('levelGradeTitle').textContent = gradeConfig[state.grade].name + '关卡';

            grid.innerHTML = levels.map((level, index) => {
                const completed = state.levelsCompleted[`${state.grade}_${level.level}`];
                const locked = index > 0 && !state.levelsCompleted[`${state.grade}_${index}`];

                return `
                    <div class="level-card ${locked ? 'locked' : ''} ${completed ? 'completed' : ''}"
                         onclick="${locked ? '' : `startLevel(${level.level})`}">
                        <div class="level-number">${level.level}</div>
                        <div class="level-name">${level.name}</div>
                        <div class="level-stars">
                            ${completed ? '⭐'.repeat(completed.stars || 1) : '☆☆☆'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function startLevel(levelNum) {
            const level = levelConfig[state.grade][levelNum - 1];
            state.currentLevel = levelNum;
            state.countOption = level.questionCount;
            state.mode = level.timeLimit ? 'timed' : 'count';
            state.timedOption = level.timeLimit || 300;

            startPractice();
        }

        // ==================== 音效 ====================
        function playSound(type) {
            if (!state.soundEnabled) return;

            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                if (type === 'correct') {
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    gainNode.gain.value = 0.3;
                } else {
                    oscillator.frequency.value = 300;
                    oscillator.type = 'triangle';
                    gainNode.gain.value = 0.2;
                }

                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.2);
            } catch (e) {
                // 音频API不支持，静默处理
            }
        }

        // ==================== 初始化 ====================
        window.onload = init;
    </script>
</body>
</html>
