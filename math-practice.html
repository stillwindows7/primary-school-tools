<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>口算练习 - 小学生趣味数学</title>
    <link rel="stylesheet" href="math-practice.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="MathPractice.goHome()">←</button>
            <h1>口算练习</h1>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="MathPractice.showView('profile')" title="个人中心">👤</button>
        </div>
    </div>

    <div class="main-container">
        <!-- 首页视图 -->
        <div class="view home-view active" id="homeView">
            <div class="welcome-card">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">🐻</div>
                    <div class="user-details">
                        <h2 id="userNameDisplay">快乐小熊</h2>
                        <p id="userGradeDisplay">一年级</p>
                    </div>
                </div>
                <div class="score-display">
                    <div class="score-item">
                        <div class="score-value" id="totalScore">0</div>
                        <div class="score-label">总积分</div>
                    </div>
                    <div class="score-item">
                        <div class="score-value" id="totalQuestions">0</div>
                        <div class="score-label">答题数</div>
                    </div>
                </div>
            </div>

            <div class="mode-selection">
                <h3 class="section-title">选择年级</h3>
                <div class="grade-cards" id="gradeCards">
                    <div class="grade-card selected" data-grade="grade1" onclick="MathPractice.selectGrade('grade1')">
                        <div class="grade-icon">🌱</div>
                        <div class="grade-name">一年级</div>
                        <div class="grade-desc">6-7岁</div>
                    </div>
                    <div class="grade-card" data-grade="grade2" onclick="MathPractice.selectGrade('grade2')">
                        <div class="grade-icon">🌿</div>
                        <div class="grade-name">二年级</div>
                        <div class="grade-desc">7-8岁</div>
                    </div>
                    <div class="grade-card" data-grade="grade3" onclick="MathPractice.selectGrade('grade3')">
                        <div class="grade-icon">🌳</div>
                        <div class="grade-name">三年级</div>
                        <div class="grade-desc">8-9岁</div>
                    </div>
                </div>

                <h3 class="section-title">选择模式</h3>
                <div class="mode-cards" id="modeCards">
                    <div class="mode-card selected" data-mode="practice" onclick="MathPractice.selectMode('practice')">
                        <div class="mode-icon">📝</div>
                        <div class="mode-name">练习模式</div>
                        <div class="mode-desc">自由练习</div>
                    </div>
                    <div class="mode-card" data-mode="level" onclick="MathPractice.selectMode('level')">
                        <div class="mode-icon">🏆</div>
                        <div class="mode-name">闯关模式</div>
                        <div class="mode-desc">挑战关卡</div>
                    </div>
                </div>

                <div class="difficulty-selector" id="difficultySelector">
                    <h3 class="section-title">选择难度</h3>
                    <div class="difficulty-buttons">
                        <button class="diff-btn easy selected" onclick="MathPractice.selectDifficulty('easy')">😊 简单</button>
                        <button class="diff-btn medium" onclick="MathPractice.selectDifficulty('medium')">🤔 中等</button>
                        <button class="diff-btn hard" onclick="MathPractice.selectDifficulty('hard')">💪 困难</button>
                    </div>
                </div>

                <div class="mode-options" id="timedOptions">
                    <h4>选择时间</h4>
                    <div class="option-buttons" id="timedBtns">
                        <button class="option-btn selected" onclick="MathPractice.selectTimedOption(60)">1分钟</button>
                        <button class="option-btn" onclick="MathPractice.selectTimedOption(180)">3分钟</button>
                        <button class="option-btn" onclick="MathPractice.selectTimedOption(300)">5分钟</button>
                    </div>
                </div>

                <div class="mode-options" id="countOptions">
                    <h4>选择题数</h4>
                    <div class="option-buttons" id="countBtns">
                        <button class="option-btn selected" onclick="MathPractice.selectCountOption(10)">10题</button>
                        <button class="option-btn" onclick="MathPractice.selectCountOption(20)">20题</button>
                        <button class="option-btn" onclick="MathPractice.selectCountOption(30)">30题</button>
                    </div>
                </div>

                <button class="start-btn" onclick="MathPractice.startPractice()">开始练习</button>
            </div>
        </div>

        <!-- 练习视图 -->
        <div class="view practice-view" id="practiceView">
            <div class="practice-header">
                <div class="progress-info">
                    <span id="progressText">第 1 题</span>
                    <span id="scoreText">积分: 0</span>
                </div>
                <div class="timer" id="timer">00:00</div>
            </div>

            <div class="streak-display" id="streakDisplay">🔥 连对 5 题！</div>

            <div class="question-container">
                <div class="question" id="question">5 + 3 = ?</div>
                <div class="encouragement" id="encouragement"></div>

                <div class="answer-section">
                    <input type="number" class="answer-input" id="answerInput" placeholder="?" readonly>
                </div>

                <div class="companion" id="companion"></div>
            </div>

            <div class="number-pad">
                <button class="num-btn" onclick="MathPractice.inputNumber(1)">1</button>
                <button class="num-btn" onclick="MathPractice.inputNumber(2)">2</button>
                <button class="num-btn" onclick="MathPractice.inputNumber(3)">3</button>
                <button class="num-btn" onclick="MathPractice.inputNumber(4)">4</button>
                <button class="num-btn" onclick="MathPractice.inputNumber(5)">5</button>
                <button class="num-btn" onclick="MathPractice.inputNumber(6)">6</button>
                <button class="num-btn" onclick="MathPractice.inputNumber(7)">7</button>
                <button class="num-btn" onclick="MathPractice.inputNumber(8)">8</button>
                <button class="num-btn" onclick="MathPractice.inputNumber(9)">9</button>
                <button class="num-btn clear" onclick="MathPractice.clearAnswer()">C</button>
                <button class="num-btn" onclick="MathPractice.inputNumber(0)">0</button>
                <button class="num-btn submit" onclick="MathPractice.submitAnswer()">OK</button>
            </div>

            <button class="stop-btn" onclick="MathPractice.stopPractice()">停止练习</button>
        </div>

        <!-- 结果视图 -->
        <div class="view result-view" id="resultView">
            <div class="result-card">
                <h2 class="result-title" id="resultTitle">练习完成！</h2>

                <div class="result-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="resultCount">10</div>
                        <div class="stat-label">完成题数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="resultCorrect">8</div>
                        <div class="stat-label">答对题数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="resultAccuracy">80%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="resultTime">02:30</div>
                        <div class="stat-label">用时</div>
                    </div>
                </div>

                <div class="new-badges" id="newBadgesSection" style="display: none;">
                    <h4>🎉 新获得勋章</h4>
                    <div class="badge-list" id="newBadgesList"></div>
                </div>

                <div class="wrong-questions" id="wrongQuestionsSection" style="display: none;">
                    <h4>❌ 错题回顾</h4>
                    <div id="wrongQuestionsList"></div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn primary" onclick="MathPractice.startPractice()">再来一次</button>
                    <button class="action-btn secondary" onclick="MathPractice.goHome()">返回首页</button>
                </div>
            </div>
        </div>

        <!-- 闯关视图 -->
        <div class="view level-view" id="levelView">
            <h2 class="section-title" id="levelGradeTitle">一年级关卡</h2>
            <div class="level-grid" id="levelGrid">
                <!-- 关卡卡片将由JS动态生成 -->
            </div>
            <button class="action-btn secondary" onclick="MathPractice.goHome()" style="margin-top: 20px;">返回首页</button>
        </div>

        <!-- 个人中心视图 -->
        <div class="view profile-view" id="profileView">
            <div class="profile-card">
                <div class="profile-avatar-section">
                    <div class="current-avatar" id="profileAvatar">🐻</div>
                    <input type="text" class="nickname-input" id="nicknameInput" placeholder="输入昵称" maxlength="10">
                </div>

                <div class="stats-summary">
                    <div class="summary-item">
                        <div class="summary-value" id="profileScore">0</div>
                        <div class="summary-label">总积分</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" id="profileQuestions">0</div>
                        <div class="summary-label">总题数</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" id="profileAccuracy">0%</div>
                        <div class="summary-label">正确率</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" id="profileStreak">0</div>
                        <div class="summary-label">最高连击</div>
                    </div>
                </div>
            </div>

            <div class="badge-wall">
                <h4>🏆 勋章墙</h4>
                <div class="badges-grid" id="badgeWall">
                    <!-- 勋章将由JS动态生成 -->
                </div>
            </div>

            <div class="settings-section">
                <h4>⚙️ 设置</h4>
                <div class="setting-item">
                    <span class="setting-label">🔊 音效</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="soundToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span class="setting-label">🎤 语音输入</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="voiceToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button class="clear-btn" onclick="MathPractice.clearWrongQuestions()">清除错题记录</button>
                <button class="action-btn secondary" onclick="MathPractice.goHome()" style="margin-top: 15px;">返回首页</button>
            </div>
        </div>
    </div>

    <!-- 引入数据配置 -->
    <script src="math-practice-data.js"></script>

    <!-- 引入模块 (按依赖顺序) -->
    <script src="js/math-practice-state.js"></script>
    <script src="js/math-practice-sound.js"></script>
    <script src="js/math-practice-effects.js"></script>
    <script src="js/math-practice-badges.js"></script>
    <script src="js/math-practice-game.js"></script>
    <script src="js/math-practice-levels.js"></script>
    <script src="js/math-practice-main.js"></script>
</body>
</html>
